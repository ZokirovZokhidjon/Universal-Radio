<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кулинария - Universal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html { scroll-behavior: smooth; }
        body { background: #050505; color: #f3f4f6; font-family: 'Segoe UI', Tahoma, Geneva, sans-serif; }

        /* РАСМЛАРНИНГ ИХЧАМ ҲАЖМИ (90-100px) */
        .prose-content img {
            width: 100px !important;
            height: 100px !important;
            object-fit: cover;
            border-radius: 15px;
            cursor: zoom-in;
            border: 2px solid #eab308; /* Тилла ранг чегара ошхона услубида */
            transition: 0.3s;
            margin: 10px;
            display: inline-block;
        }
        .prose-content img:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(234, 179, 8, 0.3); }

        /* КАТТАЛАШГАНДАГИ ЭКРАН */
        .img-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            cursor: zoom-out;
            backdrop-filter: blur(10px);
        }
        .img-overlay img {
            max-width: 90%;
            max-height: 85%;
            border-radius: 20px;
            border: 2px solid #eab308;
            animation: zoomAnim 0.3s ease-out;
        }
        @keyframes zoomAnim { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* МАҚОЛА КАРТАСИ */
        .recipe-card {
            background: #0d1117;
            border: 1px solid #1f2937;
            border-radius: 24px;
            overflow: hidden;
            transition: 0.3s;
        }
        .recipe-card:hover { border-color: #eab308; }

        .nav-link {
            display: block;
            padding: 12px;
            color: #9ca3af;
            font-size: 13px;
            border-bottom: 1px solid #1f2937;
            transition: 0.3s;
        }
        .nav-link:hover { color: #eab308; background: rgba(234, 179, 8, 0.05); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="image-viewer" class="img-overlay" onclick="closeImage()">
        <img id="full-image" src="">
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-12 border-b border-gray-800 pb-6">
            <a href="index.html" class="text-gray-500 hover:text-yellow-500 transition flex items-center gap-2">
                <i class="fas fa-arrow-left"></i> Асосий саҳифа
            </a>
            <h1 class="text-2xl md:text-3xl font-black italic uppercase text-yellow-500 tracking-tighter">
                Ошхона Сирлари
            </h1>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-10">
            <main class="lg:col-span-3 space-y-8" id="recipe-container">
                </main>

            <aside class="lg:col-span-1">
                <div class="sticky top-10 bg-[#0d1117] rounded-3xl p-6 border border-gray-800 shadow-xl">
                    <h3 class="text-yellow-500 font-bold uppercase text-[10px] tracking-[0.2em] mb-4 border-l-4 border-yellow-600 pl-3">Таомнома</h3>
                    <nav id="recipe-nav" class="space-y-1">
                        </nav>
                </div>
            </aside>
        </div>
    </div>

    <script>
        function loadRecipes() {
            const posts = JSON.parse(localStorage.getItem('my_site_posts') || '[]');
            const container = document.getElementById('recipe-container');
            const nav = document.getElementById('recipe-nav');
            
            // ФАҚАТ КУЛИНАРИЯНИ САРАЛАЙМИЗ
            const recipePosts = posts.filter(p => p.category === "Кулинария");

            if(recipePosts.length > 0) {
                container.innerHTML = recipePosts.reverse().map((p, index) => {
                    const id = `recipe-${index}`;
                    
                    // Сайдбар менюси
                    const link = document.createElement('a');
                    link.href = `#${id}`;
                    link.className = "nav-link";
                    link.innerHTML = `<i class="fas fa-utensils mr-2 text-[10px]"></i> ${p.title}`;
                    nav.appendChild(link);

                    return `
                        <article id="${id}" class="recipe-card p-6 md:p-10 shadow-2xl">
                            <div class="flex justify-between items-start mb-6">
                                <span class="bg-yellow-600/10 text-yellow-500 text-[10px] font-bold px-3 py-1 rounded-full border border-yellow-600/20 uppercase">${p.date}</span>
                            </div>
                            
                            <h2 class="text-3xl font-bold mb-6 text-white">${p.title}</h2>
                            
                            <div class="prose-content text-gray-300 leading-relaxed text-lg" onclick="checkImageClick(event)">
                                ${p.content}
                            </div>

                            ${p.video ? `
                                <div class="mt-8 rounded-2xl overflow-hidden border border-gray-800 shadow-lg">
                                    <div class="aspect-video">${p.video}</div>
                                </div>
                            ` : ''}
                        </article>
                    `;
                }).join('');
            } else {
                container.innerHTML = `
                    <div class="text-center py-20 bg-[#0d1117] rounded-3xl border border-dashed border-gray-800">
                        <i class="fas fa-hat-chef text-4xl text-gray-700 mb-4"></i>
                        <p class="text-gray-500 italic">Ҳозирча рецептлар мавжуд эмас.</p>
                    </div>`;
            }
        }

        function checkImageClick(event) {
            if (event.target.tagName === 'IMG') {
                const viewer = document.getElementById('image-viewer');
                const fullImg = document.getElementById('full-image');
                fullImg.src = event.target.src;
                viewer.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            }
        }

        function closeImage() {
            document.getElementById('image-viewer').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onload = loadRecipes;
    </script>
</body>
</html>
