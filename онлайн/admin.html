<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Studio - Админ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <style>
        .ql-container { border-radius: 0 0 12px 12px; background: rgba(255,255,255,0.05); height: 300px; color: white; }
        .ql-toolbar { background: #e5e7eb; border-radius: 12px 12px 0 0; }
        .ql-editor.ql-blank::before { color: #9ca3af; }
    </style>
</head>
<body class="bg-[#010409] text-white p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 border-b border-gray-800 pb-6 gap-4">
            <h1 class="text-2xl font-black uppercase italic text-yellow-500 tracking-tighter">
                Universal Admin Panel
            </h1>
            <a href="index.html" class="bg-gray-800 hover:bg-gray-700 px-6 py-2 rounded-full text-xs font-bold transition-all">
                Сайтга қайтиш
            </a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1">
                <div class="bg-[#0d1117] border border-yellow-500/20 p-6 rounded-3xl shadow-2xl">
                    <h2 class="text-yellow-500 font-bold mb-6 italic uppercase text-[10px] border-l-4 border-yellow-600 pl-3">Янги мақола юбориш</h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] text-gray-500 uppercase font-bold ml-2">Сарлавҳа</label>
                            <input type="text" id="postTitle" placeholder="Мақола сарлавҳаси..." 
                                class="w-full bg-black/40 border border-gray-800 p-3 rounded-xl outline-none focus:border-yellow-600 text-sm">
                        </div>

                        <div>
                            <label class="text-[10px] text-gray-500 uppercase font-bold ml-2 italic text-red-400">YouTube Video Code (Iframe)</label>
                            <input type="text" id="postVideo" placeholder='<iframe ...></iframe>' 
                                class="w-full bg-black/40 border border-gray-800 p-3 rounded-xl outline-none focus:border-red-900 text-[10px] text-gray-400 font-mono">
                        </div>

                        <div>
                            <label class="text-[10px] text-gray-500 uppercase font-bold ml-2">Рукнни танланг</label>
                            <select id="postCategory" class="w-full bg-black border border-gray-800 p-3 rounded-xl outline-none focus:border-yellow-600 text-sm text-white">
                                <option>Шеърият</option>
                                <option>Табобат</option>
                                <option>Янгиликлар</option>
                                <option>Кулинария</option>
                                <option>Балиқ ови</option>
                            </select>
                        </div>

                        <div>
                            <label class="text-[10px] text-gray-500 uppercase font-bold ml-2">Мазмуни</label>
                            <div id="editor"></div>
                        </div>

                        <button onclick="savePost()" class="w-full bg-yellow-600 hover:bg-yellow-500 text-black font-black py-4 rounded-xl uppercase text-[11px] tracking-widest transition-all shadow-lg">
                            ЮБОРИШ
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-[#0d1117] border border-gray-800 p-6 rounded-3xl shadow-xl">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-white font-bold italic uppercase text-[10px] tracking-widest">Мақолалар архиви</h2>
                        <span id="postCount" class="text-[10px] bg-yellow-600/10 text-yellow-500 px-3 py-1 rounded-full border border-yellow-600/20 font-bold">0 та</span>
                    </div>
                    
                    <div class="overflow-x-auto text-[13px]">
                        <table class="w-full text-left">
                            <thead class="border-b border-gray-800 text-gray-500 uppercase text-[10px]">
                                <tr>
                                    <th class="py-3 px-2">Сана</th>
                                    <th class="py-3 px-2">Бўлим</th>
                                    <th class="py-3 px-2">Сарлавҳа</th>
                                    <th class="py-3 px-2 text-right">Амаллар</th>
                                </tr>
                            </thead>
                            <tbody id="archiveTable" class="divide-y divide-gray-900"></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div> </div> <script>
        // Муҳаррир
        var quill = new Quill('#editor', {
            theme: 'snow',
            placeholder: 'Матнни ёзинг...',
            modules: {
                toolbar: [
                    ['bold', 'italic', 'underline'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['link', 'image'],
                    ['clean']
                ]
            }
        });

        // Сақлаш
        function savePost() {
            const title = document.getElementById('postTitle').value;
            const category = document.getElementById('postCategory').value;
            const video = document.getElementById('postVideo').value;
            const content = quill.root.innerHTML; 
            const date = new Date().toLocaleDateString();

            if (!title || quill.getText().trim().length === 0) {
                alert("Маълумотларни тўлдиринг!");
                return;
            }

            const posts = JSON.parse(localStorage.getItem('my_site_posts') || '[]');
            posts.push({ title, category, video, content, date });
            localStorage.setItem('my_site_posts', JSON.stringify(posts));

            alert("Жойланди!");
            location.reload(); 
        }

        // Кўрсатиш
        function displayPosts() {
            const posts = JSON.parse(localStorage.getItem('my_site_posts') || '[]');
            const table = document.getElementById('archiveTable');
            document.getElementById('postCount').innerText = `${posts.length} та`;

            table.innerHTML = posts.reverse().map((p, index) => {
                const originalIndex = posts.length - 1 - index;
                return `
                    <tr class="hover:bg-white/5 transition-colors">
                        <td class="py-4 px-2 text-gray-500 text-[11px]">${p.date}</td>
                        <td class="py-4 px-2 font-bold text-yellow-600/80">${p.category}</td>
                        <td class="py-4 px-2 text-gray-200 truncate max-w-[150px]">${p.title}</td>
                        <td class="py-4 px-2 text-right">
                            <button onclick="deletePost(${originalIndex})" class="text-red-500 font-bold uppercase text-[10px]">Ўчириш</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function deletePost(index) {
            if(confirm("Ўчирилсинми?")) {
                let posts = JSON.parse(localStorage.getItem('my_site_posts') || '[]');
                posts.splice(index, 1);
                localStorage.setItem('my_site_posts', JSON.stringify(posts));
                displayPosts();
            }
        }

        window.onload = displayPosts;
    </script>
</body>
</html>
