<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Балиқ Ови - Universal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html { scroll-behavior: smooth; }
        body { background: #020c1b; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }

        /* ЮҚОРИДАГИ АНИМАЦИЯ ВА ИКОНКА */
        .fishing-header {
            background: linear-gradient(to bottom, #0a192f, #020c1b);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 3px solid #0ea5e9;
        }
        .fishing-icon {
            font-size: 50px;
            color: #0ea5e9;
            margin-bottom: 15px;
            animation: boat-float 3s ease-in-out infinite;
        }
        @keyframes boat-float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        /* РАСМЛАРНИНГ ИХЧАМ ҲАЖМИ (90-100px) */
        .prose-content img {
            width: 100px !important;
            height: 100px !important;
            object-fit: cover;
            border-radius: 20px 5px 20px 5px;
            cursor: zoom-in;
            border: 2px solid #38bdf8;
            transition: 0.4s;
            margin: 10px;
            display: inline-block;
        }
        .prose-content img:hover { transform: scale(1.1) rotate(2deg); border-color: #fff; }

        /* КАТТАЛАШГАНДАГИ ЭКРАН */
        .img-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(1, 10, 25, 0.98);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            cursor: zoom-out;
            backdrop-filter: blur(15px);
        }
        .img-overlay img {
            max-width: 90%;
            max-height: 85%;
            border-radius: 12px;
            border: 2px solid #38bdf8;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* МАҚОЛА КАРТАСИ */
        .fishing-card {
            background: #0d1b2a;
            border: 1px solid #1e293b;
            border-radius: 20px;
            overflow: hidden;
            transition: 0.3s;
        }
        .fishing-card:hover { border-color: #38bdf8; box-shadow: 0 10px 30px -10px rgba(56, 189, 248, 0.2); }

        .nav-link {
            display: block;
            padding: 12px;
            color: #94a3b8;
            font-size: 13px;
            border-bottom: 1px solid #1e293b;
            transition: 0.3s;
        }
        .nav-link:hover { color: #38bdf8; background: rgba(56, 189, 248, 0.05); }
    </style>
</head>
<body class="p-0">

    <div id="image-viewer" class="img-overlay" onclick="closeImage()">
        <img id="full-image" src="">
    </div>

    <div class="fishing-header">
        <div class="fishing-icon">
            <i class="fas fa-fish"></i> <i class="fas fa-ship ml-4"></i> </div>
        <h1 class="text-4xl font-black uppercase italic tracking-tighter text-sky-400">
            Балиқ Ови Олами
        </h1>
        <p class="text-sky-700 text-[10px] uppercase font-bold mt-2 tracking-[0.5em]">Саргузаштлар ва Тажрибалар</p>
    </div>

    <div class="max-w-6xl mx-auto p-4 md:p-10">
        <div class="mb-10">
            <a href="index.html" class="text-sky-500 hover:text-white transition flex items-center gap-2 font-bold text-xs">
                <i class="fas fa-chevron-left"></i> АСОСИЙ САҲИФАГА ҚАЙТИШ
            </a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-10">
            <main class="lg:col-span-3 space-y-8" id="fishing-container">
                </main>

            <aside class="lg:col-span-1">
                <div class="sticky top-10 bg-[#0d1b2a] rounded-2xl p-6 border border-sky-900/30">
                    <h3 class="text-sky-500 font-bold uppercase text-[10px] tracking-widest mb-4">Ов кундалиги</h3>
                    <nav id="fishing-nav">
                        </nav>
                </div>
            </aside>
        </div>
    </div>

    <script>
        function loadFishingPosts() {
            const posts = JSON.parse(localStorage.getItem('my_site_posts') || '[]');
            const container = document.getElementById('fishing-container');
            const nav = document.getElementById('fishing-nav');
            
            // "Балиқ ови" рукнини саралаймиз
            const fishingPosts = posts.filter(p => p.category === "Балиқ ови");

            if(fishingPosts.length > 0) {
                container.innerHTML = fishingPosts.reverse().map((p, index) => {
                    const id = `fish-${index}`;
                    
                    const link = document.createElement('a');
                    link.href = `#${id}`;
                    link.className = "nav-link";
                    link.innerHTML = `<i class="fas fa-anchor mr-2 text-[10px]"></i> ${p.title}`;
                    nav.appendChild(link);

                    return `
                        <article id="${id}" class="fishing-card p-6 md:p-10">
                            <div class="flex items-center gap-3 mb-6">
                                <span class="w-2 h-2 bg-sky-500 rounded-full"></span>
                                <span class="text-sky-600 text-[10px] font-black uppercase tracking-widest">${p.date}</span>
                            </div>
                            
                            <h2 class="text-3xl font-bold mb-6 text-white border-b border-sky-900 pb-4">${p.title}</h2>
                            
                            <div class="prose-content text-slate-300 leading-relaxed text-lg" onclick="checkImageClick(event)">
                                ${p.content}
                            </div>

                            ${p.video ? `
                                <div class="mt-8 rounded-xl overflow-hidden border-2 border-sky-900 shadow-2xl">
                                    <div class="aspect-video">${p.video}</div>
                                </div>
                            ` : ''}
                        </article>
                    `;
                }).join('');
            } else {
                container.innerHTML = `<p class="text-center text-slate-600 italic py-20">Ҳозирча балиқ овига оид мақолалар йўқ.</p>`;
            }
        }

        function checkImageClick(event) {
            if (event.target.tagName === 'IMG') {
                const viewer = document.getElementById('image-viewer');
                const fullImg = document.getElementById('full-image');
                fullImg.src = event.target.src;
                viewer.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            }
        }

        function closeImage() {
            document.getElementById('image-viewer').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onload = loadFishingPosts;
    </script>
</body>
</html>
