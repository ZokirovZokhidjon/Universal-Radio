<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шеърият Гулшани - Universal Radio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:italic,wght@700&display=swap');
        body { background: #08050a; color: #d1d5db; font-family: 'Times New Roman', serif; }
        .poem-box { background: #110c18; border-left: 4px solid #7c3aed; padding: 30px; border-radius: 0 20px 20px 0; }
        .poem-title { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="p-5 md:p-10">
    <div class="max-w-4xl mx-auto">
        <a href="index.html" class="text-purple-500 font-bold">← Орқага</a>
        <h1 class="text-4xl poem-title text-center my-10 text-purple-400 italic">✨ Шеърият Гулшани</h1>

        <div class="space-y-12">
            <div class="poem-box shadow-2xl">
                <h2 class="text-2xl font-bold text-white mb-6 text-center poem-title">Шеър сарлавҳаси</h2>
                <div class="text-xl text-center italic leading-loose text-purple-200">
                    Биринчи мисра...<br>
                    Иккинчи мисра...<br>
                    Учинчи мисра...<br>
                    Тўртинчи мисра...
                </div>
                <p class="text-right mt-6 text-purple-500 font-bold">— Муаллиф номи</p>
            </div>

            <div class="poem-box shadow-2xl bg-opacity-50">
                <h2 class="text-2xl font-bold text-white mb-6 text-center poem-title">Навбатдаги ғазал ёки шеър</h2>
                <div class="text-xl text-center italic leading-loose text-gray-400">
                    </div>
            </div>
        </div>

        <div class="mt-20 p-8 border-t border-purple-900 text-center">
            <h3 class="text-purple-400 uppercase tracking-widest text-sm mb-4">Биз севган ижодкорлар</h3>
            <div class="flex flex-wrap justify-center gap-4 text-xs">
                <span class="bg-purple-900/30 px-3 py-1 rounded-full">Алишер Навоий</span>
                <span class="bg-purple-900/30 px-3 py-1 rounded-full">Заҳириддин Муҳаммад Бобур</span>
                <span class="bg-purple-900/30 px-3 py-1 rounded-full">Абдулла Орипов</span>
                <span class="bg-purple-900/30 px-3 py-1 rounded-full">Эркин Воҳидов</span>
            </div>
        </div>
    </div>
</body>
</html>
