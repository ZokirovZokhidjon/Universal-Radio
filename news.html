<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal News Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Roboto:wght@400;700&display=swap');
        body { background: #0a0a0a; color: #ffffff; font-family: 'Roboto', sans-serif; margin: 0; }
        
        .post-title { font-size: 20px !important; font-family: 'Montserrat'; font-weight: 700; color: #fff; cursor: pointer; line-height: 1.2; }
        .news-thumb { width: 80px !important; height: 80px !important; min-width: 80px; object-fit: cover; border-radius: 10px; border: 2px solid #ffcc00; }
        .news-card { background: #141414; border-radius: 12px; padding: 12px; display: flex; gap: 12px; transition: 0.3s; cursor: pointer; }
        .news-card:hover { background: #1a1a1a; }
        
        .ticker-wrapper { background: #ffcc00; color: #000; padding: 8px 0; overflow: hidden; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        .ticker-text { display: inline-block; white-space: nowrap; animation: ticker 25s linear infinite; font-size: 12px; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .post-content img { max-width: 100%; height: auto; border-radius: 10px; margin: 15px 0; border: 1px solid #ffcc00; }
    </style>
</head>
<body>

    <div class="ticker-wrapper">
        <div class="ticker-text">+++ UNIVERSAL NEWS: ТЕЗКОР ХАБАРЛАР ВА ОНЛАЙН РАДИО +++ 24/7 ЖОНЛИ ЭФИРЛАР +++</div>
    </div>

    <div class="max-w-4xl mx-auto px-4 py-6">
        <header class="mb-8 border-b-2 border-yellow-500 pb-4 text-center">
            <h1 class="text-4xl font-black uppercase italic">Universal <span class="text-yellow-500">News</span></h1>
            <input type="text" id="searchBar" onkeyup="searchPosts()" placeholder="Қидириш..." 
                class="w-full mt-4 bg-white/10 border border-gray-700 p-3 rounded-lg outline-none text-white">
        </header>

        <div id="news-list" class="space-y-4">
            </div>
    </div>

    <script>
        /* ДИҚҚАТ! Мақолаларни мана шу ерга қўшинг. 
           Бу ерга ёзилган мақолалар Гитхаб орқали ҳаммада кўринади.
        */
         const myPosts = [
    {
        title: "Энг янги хабар", // Янги қўшилган хабар
        date: "15.04.2026",
        content: "Матн шу ерда...",
        image: "logo2.jpg"
    }, // Мана бу вергул бўлиши шарт!
    {
        title: "Эски хабар",
        date: "14.04.2026",
        content: "Эски матн...",
        image: "logo2.jpg"
    }
];
        function displayPosts(data) {
            const list = document.getElementById('news-list');
            list.innerHTML = "";
            data.forEach((post, index) => {
                list.innerHTML += `
                    <div class="news-card" onclick="showSinglePost(${index})">
                        <img src="${post.image}" class="news-thumb">
                        <div class="flex-1 min-w-0">
                            <span class="text-[10px] text-yellow-500 font-bold">${post.date}</span>
                            <h2 class="post-title line-clamp-2">${post.title}</h2>
                            <p class="text-xs text-gray-400 mt-2">Ўқиш →</p>
                        </div>
                    </div>
                `;
            });
        }

        function showSinglePost(index) {
            const post = myPosts[index];
            const list = document.getElementById('news-list');
            document.getElementById('searchBar').style.display = 'none';
            
            list.innerHTML = `
                <div>
                    <button onclick="window.location.reload()" class="text-yellow-500 font-bold mb-4">← ОРҚАГА</button>
                    <h1 class="text-3xl font-black mb-4">${post.title}</h1>
                    <p class="text-gray-500 text-sm mb-4 border-l-4 border-yellow-500 pl-4">${post.date}</p>
                    <div class="post-content text-lg text-gray-300 leading-relaxed">
                        ${post.content}
                    </div>
                </div>
            `;
            window.scrollTo(0, 0);
        }

        function searchPosts() {
            const q = document.getElementById('searchBar').value.toLowerCase();
            const filtered = myPosts.filter(p => p.title.toLowerCase().includes(q));
            displayPosts(filtered);
        }

        displayPosts(myPosts);
    </script>
</body>
</html>
