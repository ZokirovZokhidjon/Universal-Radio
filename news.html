 <!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Universal News Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Roboto:wght@400;700&display=swap');
        
        body { background: #0a0a0a; color: #ffffff; font-family: 'Roboto', sans-serif; overflow-x: hidden; }
        
        /* Сарлавҳа 20px */
        .post-title { font-size: 18px !important; font-family: 'Montserrat'; font-weight: 700; line-height: 1.2; cursor: pointer; transition: 0.3s; color: #fff; }
        @media (min-width: 768px) { .post-title { font-size: 20px !important; } }

        /* Расм 80px ва мобилда қулайлик */
        .news-thumb { 
            width: 80px !important; 
            height: 80px !important; 
            min-width: 80px;
            object-fit: cover; 
            border-radius: 10px; 
            border: 2px solid #ffcc00;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        /* Мобилда босганда катталашиш */
        .news-thumb:active { transform: scale(1.5); z-index: 50; position: relative; }

        .news-card { background: #141414; border-radius: 12px; border-bottom: 3px solid transparent; transition: 0.3s; margin-bottom: 12px; width: 100%; }
        .news-card:hover { border-bottom-color: #ffcc00; background: #1a1a1a; }
        
        .ticker-wrapper { background: #ffcc00; color: #000; padding: 8px 0; overflow: hidden; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        .ticker-text { display: inline-block; white-space: nowrap; animation: ticker 25s linear infinite; font-size: 12px; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Мақола ичидаги расмлар мобилга мос бўлиши учун */
        .post-content img { max-width: 100% !important; height: auto !important; border-radius: 8px; margin: 15px 0; border: 1px solid #ffcc00; }
        iframe, video { width: 100% !important; aspect-ratio: 16/9; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="ticker-wrapper">
        <div class="ticker-text">+++ UNIVERSAL NEWS: ТЕЗКОР ХАБАРЛАР ВА ОНЛАЙН РАДИО +++ ЭНГ СЎНГГИ ЖОНЛИ ЭФИРЛАР +++ 24/7 +++</div>
    </div>

    <div class="max-w-7xl mx-auto px-3 md:px-4 py-6">
        <header class="flex flex-col gap-4 mb-8 border-b-2 border-yellow-500 pb-4">
            <div class="text-center md:text-left">
                <h1 class="text-3xl md:text-5xl font-black italic uppercase tracking-tighter">Universal <span class="text-yellow-500">News</span></h1>
            </div>
            
            <div class="flex flex-col gap-3 w-full">
                <input type="text" id="searchBar" onkeyup="searchPosts()" placeholder="Қидириш..." 
                    class="bg-white/10 border border-gray-700 py-3 px-4 rounded-lg focus:border-yellow-500 outline-none w-full text-white text-base">
                <div class="flex justify-between items-center">
                    <a href="index.html" class="bg-yellow-500 text-black px-5 py-2 rounded font-bold text-xs uppercase">Асосий</a>
                    <div class="text-xs font-bold text-gray-400">ЖАМИ: <span id="stat-total" class="text-yellow-500">0</span></div>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div id="main-col" class="lg:col-span-9 order-1">
                <div id="news-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <div id="side-col" class="lg:col-span-3 order-2">
                <h3 class="text-lg font-black mb-4 border-l-4 border-yellow-500 pl-2 uppercase">Лента</h3>
                <div id="side-list" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        const storageKey = 'my_site_posts'; 
        let allPosts = JSON.parse(localStorage.getItem(storageKey) || '[]');
        let newsData = allPosts.filter(p => p.category === "Янгиликлар").reverse(); 

        function displayPosts(data) {
            const list = document.getElementById('news-list');
            list.innerHTML = "";

            if(data.length === 0) {
                list.innerHTML = "<div class='py-10 text-center text-gray-500 italic w-full'>Маълумот мавжуд эмас...</div>";
                return;
            }

            data.forEach((post) => {
                const realIndex = newsData.findIndex(p => p.title === post.title && p.date === post.date);
                
                let tempDiv = document.createElement('div');
                tempDiv.innerHTML = post.content;
                let firstImg = tempDiv.querySelector('img');
                let imgSrc = firstImg ? firstImg.src : 'logo2.jpg';

                list.innerHTML += `
                    <div class="news-card p-3 flex gap-3 items-start">
                        <img src="${imgSrc}" class="news-thumb" onclick="event.stopPropagation();">
                        <div class="flex-1 min-w-0">
                            <span class="text-[9px] text-yellow-500 font-bold uppercase">${post.date}</span>
                            <h2 class="post-title line-clamp-2 mt-1" onclick="showSinglePost(${realIndex})">${post.title}</h2>
                            <div class="mt-2 flex justify-between items-center">
                                <button onclick="showSinglePost(${realIndex})" class="text-yellow-500 text-[10px] font-bold uppercase">Ўқиш →</button>
                                <i class="fas fa-paper-plane text-gray-700 text-[10px]"></i>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function showSinglePost(index) {
            const post = newsData[index];
            if(!post) return;

            document.getElementById('side-col').classList.add('hidden');
            const mainCol = document.getElementById('main-col');
            mainCol.className = 'lg:col-span-12 w-full';

            document.getElementById('news-list').innerHTML = `
                <div class="max-w-3xl mx-auto">
                    <button onclick="window.location.reload()" class="bg-white/10 px-4 py-2 text-[10px] font-bold uppercase mb-6 rounded text-yellow-500">
                        <i class="fas fa-arrow-left mr-1"></i> Орқага
                    </button>
                    
                    <div class="mb-6">
                        <h1 class="text-2xl md:text-5xl font-black mb-3 leading-tight text-white">${post.title}</h1>
                        <div class="text-gray-500 text-xs font-bold border-l-2 border-yellow-500 pl-2">${post.date}</div>
                    </div>

                    <div class="post-content text-lg leading-relaxed text-gray-300 space-y-4 overflow-hidden">
                        ${post.content}
                    </div>

                    ${post.video ? `<div class="mt-6 shadow-2xl">${post.video}</div>` : ''}

                    <div class="mt-12 p-6 bg-white/5 border-t-2 border-yellow-500 text-center rounded-xl">
                        <p class="text-xs font-bold mb-4">ДЎСТЛАРГА УЛАШИНГ</p>
                        <button onclick="sharePost('${post.title.replace(/'/g, "\\'")}')" class="bg-yellow-500 text-black px-8 py-3 font-black uppercase rounded-full text-xs">Telegram</button>
                    </div>
                </div>
            `;
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function loadSideMenu() {
            const side = document.getElementById('side-list');
            side.innerHTML = newsData.slice(0, 10).map((post, idx) => `
                <div onclick="showSinglePost(${idx})" class="cursor-pointer border-b border-white/5 pb-2">
                    <p class="text-[8px] text-yellow-500 uppercase">${post.date}</p>
                    <h4 class="text-sm font-medium line-clamp-1 hover:text-yellow-500">${post.title}</h4>
                </div>`).join('');
        }

        function searchPosts() {
            const q = document.getElementById('searchBar').value.toLowerCase();
            const filtered = newsData.filter(p => p.title.toLowerCase().includes(q));
            displayPosts(filtered);
        }

        function sharePost(title) {
            const url = window.location.href;
            window.open(`https://t.me/share/url?url=${url}&text=${encodeURIComponent(title)}`, '_blank');
        }

        // Ишга тушириш
        document.getElementById('stat-total').innerText = newsData.length;
        displayPosts(newsData);
        loadSideMenu();
    </script>
</body>
</html>
