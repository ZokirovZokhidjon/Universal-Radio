 <!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal News Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0a0a0a; color: #ffffff; font-family: sans-serif; margin: 0; padding: 0; }
        
        /* ЮҚОРИ ПАНЕЛ */
        .header-nav { 
            background: #000; padding: 15px; border-bottom: 2px solid #ffcc00; 
            display: flex; justify-content: space-between; align-items: center;
        }

        /* МАҚОЛА ИЧИДАГИ РАСМЛАР */
        #full-article-view img {
            width: 100px !important; /* Бошида жуда кичик - 100px */
            height: auto !important;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px 0;
            display: block;
            border: 1px solid #444;
        }

        /* РАСМ БОСИЛГАНДА - 150 ПИКСЕЛГАЧА КАТТАЛАШАДИ */
        #full-article-view img.active-zoom {
            width: 150px !important; /* Сиз айтган ўлчам */
            border-color: #ffcc00;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.5);
        }

        .side-card { background: #141414; border-radius: 12px; padding: 10px; display: flex; gap: 10px; margin-bottom: 10px; cursor: pointer; border: 1px solid #222; }
        .side-thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; }
    </style>
</head>
<body>

    <header class="header-nav">
        <a href="index.html" class="bg-yellow-600 text-black px-4 py-2 rounded font-bold text-xs uppercase">
            <i class="fas fa-arrow-left"></i> Бош саҳифа
        </a>
        <h1 class="text-xl font-bold italic uppercase text-yellow-500">Universal News</h1>
    </header>

    <div class="max-w-6xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <main class="lg:col-span-8 bg-[#0d1117] p-5 rounded-xl border border-gray-800">
            <div id="full-article-view">
                </div>
        </main>

        <aside class="lg:col-span-4">
            <h3 class="text-yellow-500 font-bold uppercase text-[10px] mb-3">Бошқа хабарлар</h3>
            <div id="side-list-view"></div>
        </aside>
    </div>

    <script>
        const postsData = JSON.parse(localStorage.getItem('my_site_posts') || '[]').reverse();

        function renderList() {
            const list = document.getElementById('side-list-view');
            list.innerHTML = postsData.map((p, i) => `
                <div class="side-card" onclick="loadNews(${i})">
                    <img src="${p.image || 'logo.jpg'}" class="side-thumb">
                    <div>
                        <h2 class="text-xs font-bold leading-tight line-clamp-2">${p.title}</h2>
                        <span class="text-[8px] text-gray-500">${p.date}</span>
                    </div>
                </div>
            `).join('');
        }

        function loadNews(i) {
            const post = postsData[i];
            const view = document.getElementById('full-article-view');
            
            view.innerHTML = `
                <h1 class="text-2xl font-bold mb-3">${post.title}</h1>
                <p class="text-[10px] text-gray-500 mb-4">${post.date} | ${post.category}</p>
                <div class="news-body text-gray-300 leading-relaxed">${post.content}</div>
            `;

            // Расмларни топиб, уларга "босилганда 150px бўлиш" хусусиятини қўшамиз
            const images = view.querySelectorAll('img');
            images.forEach(img => {
                img.onclick = function() {
                    this.classList.toggle('active-zoom');
                };
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = () => {
            renderList();
            if (postsData.length > 0) loadNews(0);
        };
    </script>
</body>
</html>
