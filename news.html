<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Universal News Portal - Modern Radio Style</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Roboto:wght@300;400;700&display=swap');
        body { background: #0a0a0a; color: #ffffff; font-family: 'Roboto', sans-serif; scroll-behavior: smooth; }
        h1, h2, h3, .font-heading { font-family: 'Montserrat', sans-serif; }

        .ticker-wrapper { background: #ffcc00; color: #000; padding: 8px 0; overflow: hidden; font-weight: bold; font-size: 13px; text-transform: uppercase; }
        .ticker-text { display: inline-block; white-space: nowrap; animation: ticker 30s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .news-card { background: #141414; border-bottom: 4px solid transparent; transition: all 0.3s ease; border-radius: 12px; overflow: hidden; }
        .news-card:hover { border-bottom-color: #ffcc00; transform: translateY(-5px); background: #1c1c1c; }
        .main-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        
        /* Расмлар учун махсус стиль (сиз сўрагандек кичик ва босиладиган) */
        .post-content img { width: 120px !important; height: 120px !important; object-fit: cover; border-radius: 10px; cursor: zoom-in; margin: 10px; border: 2px solid #ffcc00; }
        
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body>

    <div class="ticker-wrapper">
        <div class="ticker-text">
            +++ UNIVERSAL STUDIO: ЭНГ СЎНГГИ ЖОНЛИ ЭФИРЛАР ВА ТЕЗКОР ХАБАРЛАР ПОРТАЛИ +++ МУҲИМ ЯНГИЛИКЛАРНИ ЎТКАЗИБ ЮБОРМАНГ +++ 24/7 ОНЛАЙН РАДИО +++
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 py-6">
        <header class="flex flex-col lg:flex-row justify-between items-end mb-10 border-b-4 border-yellow-500 pb-6 gap-6">
            <div>
                <h1 class="text-4xl md:text-6xl font-black uppercase tracking-tighter italic">
                    Universal <span class="text-yellow-500">News</span>
                </h1>
                <p class="text-sm text-gray-400 font-bold tracking-[5px] mt-2 uppercase">Global Media Studio</p>
            </div>
            
            <div class="flex flex-col items-end gap-4 w-full lg:w-auto">
                <div class="relative w-full md:w-80">
                    <input type="text" id="searchBar" onkeyup="searchPosts()" placeholder="Қидириш..." 
                        class="w-full bg-white/5 border-b-2 border-gray-700 py-2 px-4 focus:border-yellow-500 outline-none transition-all text-white">
                    <i class="fas fa-search absolute right-3 top-3 text-gray-500"></i>
                </div>
                <div class="flex gap-3">
                    <a href="index.html" class="bg-yellow-500 text-black px-6 py-2 text-xs font-black uppercase hover:bg-white transition">Асосий</a>
                    <div class="bg-white/10 px-4 py-2 text-xs font-bold border-l-2 border-yellow-500">
                        ЖАМИ: <span id="stat-total" class="text-yellow-500">0</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-3 order-2 lg:order-1">
                <h3 class="text-xl font-black mb-6 border-b-2 border-yellow-500 inline-block">LIVE FEED</h3>
                <div id="side-list" class="space-y-6"></div>
            </div>

            <div class="lg:col-span-9 order-1 lg:order-2">
                <div id="news-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </div>
        </div>
    </div>

    <script>
        const storageKey = 'my_site_posts'; 
        // 1. Маълумотни оламиз ва фақат "Янгиликлар" категориясини саралаймиз
        const allPosts = JSON.parse(localStorage.getItem(storageKey) || '[]');
        let newsData = allPosts.filter(p => p.category === "Янгиликлар").reverse(); 

        function displayPosts(data) {
            const list = document.getElementById('news-list');
            list.innerHTML = "";

            if(data.length === 0) {
                list.innerHTML = "<div class='col-span-full py-20 text-center text-gray-500 italic uppercase tracking-widest'>Янгиликлар мавжуд эмас...</div>";
                return;
            }

            data.forEach((post, index) => {
                const isFirst = index === 0 && document.getElementById('searchBar').value === "";
                
                list.innerHTML += `
                    <div class="news-card group ${isFirst ? 'md:col-span-2' : ''} p-4">
                        <div class="flex justify-between items-center mb-3">
                            <span class="bg-yellow-500 text-black px-2 py-0.5 text-[10px] font-black uppercase">Янгилик</span>
                            <span class="text-[10px] text-gray-500 font-bold">${post.date}</span>
                        </div>

                        <h2 class="${isFirst ? 'text-2xl md:text-4xl' : 'text-xl'} font-bold mb-3 leading-tight group-hover:text-yellow-500 transition cursor-pointer" onclick="showSinglePost(${index})">
                            ${post.title}
                        </h2>

                        <div class="text-gray-400 text-sm mb-4 line-clamp-2">
                            ${post.content.replace(/<[^>]*>?/gm, '').substring(0, 150)}...
                        </div>
                        
                        <div class="flex justify-between items-center border-t border-white/5 pt-4">
                            <button onclick="showSinglePost(${index})" class="font-black text-[11px] uppercase tracking-widest text-yellow-500 hover:text-white transition">
                                Ўқиш <i class="fas fa-arrow-right ml-1"></i>
                            </button>
                            <button onclick="sharePost('${post.title}')" class="text-gray-600 hover:text-yellow-500 transition"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                `;
            });
        }

        function showSinglePost(index) {
            const post = newsData[index];
            const list = document.getElementById('news-list');
            // Сайдбарни яширамиз
            document.querySelector('.lg:col-span-3').classList.add('hidden');
            document.querySelector('.lg:col-span-9').className = 'lg:col-span-12';

            list.innerHTML = `
                <div class="max-w-4xl mx-auto">
                    <button onclick="location.reload()" class="bg-white/10 px-4 py-2 text-[10px] font-bold uppercase mb-8 hover:bg-yellow-500 hover:text-black transition">
                        <i class="fas fa-chevron-left mr-2"></i> Орқага қайтиш
                    </button>
                    
                    <div class="mb-10">
                        <span class="text-yellow-500 font-black uppercase tracking-[3px] text-xs">REPORTAGE</span>
                        <h1 class="text-3xl md:text-6xl font-black mt-4 leading-none">${post.title}</h1>
                        <div class="text-gray-500 mt-4 font-bold text-sm border-l-4 border-yellow-500 pl-4">${post.date} | UNIVERSAL NEWS</div>
                    </div>

                    <div class="post-content text-xl leading-relaxed text-gray-300 space-y-6">
                        ${post.content}
                    </div>

                    ${post.video ? `<div class="mt-10 rounded-xl overflow-hidden shadow-2xl">${post.video}</div>` : ''}

                    <div class="mt-20 p-10 bg-white/5 border-t-4 border-yellow-500 text-center rounded-xl">
                        <h4 class="font-bold mb-4 uppercase">Дўстларингизга юборинг</h4>
                        <button onclick="sharePost('${post.title}')" class="bg-yellow-500 text-black px-10 py-3 font-black uppercase rounded-full hover:scale-105 transition">Telegram</button>
                    </div>
                </div>
            `;
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function loadSideMenu() {
            const side = document.getElementById('side-list');
            side.innerHTML = newsData.slice(0, 8).map((post, index) => `
                <div onclick="showSinglePost(${index})" class="group cursor-pointer border-b border-white/5 pb-4 transition hover:pl-2">
                    <p class="text-[9px] font-black text-yellow-500 mb-1 uppercase">${post.date}</p>
                    <h4 class="text-sm font-bold leading-snug group-hover:text-yellow-500 transition">${post.title}</h4>
                </div>
            `).join('');
        }

        function searchPosts() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const filtered = newsData.filter(p => p.title.toLowerCase().includes(query));
            displayPosts(filtered);
        }

        function sharePost(title) {
            const url = window.location.href;
            window.open(`https://t.me/share/url?url=${url}&text=${encodeURIComponent(title)}`, '_blank');
        }

        // Ишга тушириш
        document.getElementById('stat-total').innerText = newsData.length;
        displayPosts(newsData);
        loadSideMenu();
    </script>
    </body>
</html>
