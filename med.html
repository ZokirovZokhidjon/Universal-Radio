 <!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Табобат олами - Universal Radio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html { scroll-behavior: smooth; }
        body { background: #010409; color: #e6edf3; font-family: 'Inter', sans-serif; }
        
        /* 1. МАҚОЛА ИЧИДАГИ РАСМЛАР (ДАСТЛАБКИ КИЧИК ҲАЖМ) */
        .prose-content img {
            width: 120px !important; /* Жуда ихчам */
            height: 120px !important;
            object-fit: cover;
            border-radius: 15px;
            cursor: zoom-in; /* Босса бўладиган белги */
            border: 2px solid #10b981;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin: 10px;
        }
        .prose-content img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        /* 2. РАСМ КАТТАЛАШГАНДАГИ ЭФФЕКТ (FULL SCREEN) */
        .img-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none; /* Одатда яширин */
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: zoom-out;
            backdrop-filter: blur(10px);
        }
        .img-overlay img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 20px;
            border: 3px solid #10b981;
            box-shadow: 0 0 50px rgba(16, 185, 129, 0.5);
            animation: zoomIn 0.3s ease-out;
        }
        @keyframes zoomIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* БОШҚА ДИЗАЙН ЭЛЕМЕНТЛАРИ */
        .card-vivid {
            background: #0d1117;
            border: 1px solid #30363d;
            border-left: 5px solid #10b981;
            border-radius: 1.5rem;
            transition: 0.3s;
        }
        .vivid-btn {
            background: rgba(16, 185, 129, 0.1);
            border-left: 3px solid #10b981;
            padding: 12px;
            margin-bottom: 8px;
            display: block;
            color: #34d399;
            font-weight: 600;
            border-radius: 0 10px 10px 0;
            transition: 0.3s;
            text-decoration: none;
        }
        .vivid-btn:hover { background: #10b981; color: white; padding-left: 20px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="image-viewer" class="img-overlay" onclick="closeImage()">
        <img id="full-image" src="">
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <a href="index.html" class="text-emerald-500 font-bold flex items-center gap-2 hover:opacity-80">
                <span>←</span> Орқага
            </a>
            <div class="text-[10px] text-emerald-800 font-black tracking-[0.4em]">UNIVERSAL STUDIO</div>
        </header>

        <h1 class="text-5xl md:text-7xl font-black mb-14 text-white italic tracking-tighter">
            🌿 Табобат <span class="text-emerald-500">Олами</span>
        </h1>

        <div class="flex flex-col lg:flex-row gap-10">
            <main class="w-full lg:w-3/4 order-2 lg:order-1" id="medical-articles">
                </main>

            <aside class="w-full lg:w-1/4 order-1 lg:order-2">
                <div class="bg-[#0d1117] p-6 rounded-3xl border border-gray-800 sticky top-5 shadow-2xl">
                    <h3 class="text-emerald-500 text-[11px] font-black uppercase tracking-widest mb-6 border-b border-emerald-900/30 pb-2">Мундарижа</h3>
                    <nav id="sidebar-nav"></nav>
                </div>
            </aside>
        </div>
    </div>

    <script>
        // МАҚОЛАЛАРНИ ЮКЛАШ
        function loadMedicalPosts() {
            const posts = JSON.parse(localStorage.getItem('my_site_posts') || '[]');
            const container = document.getElementById('medical-articles');
            const nav = document.getElementById('sidebar-nav');
            const medPosts = posts.filter(p => p.category === "Табобат");

            if(medPosts.length > 0) {
                container.innerHTML = medPosts.reverse().map((p, index) => {
                    const id = `post-${index}`;
                    
                    const link = document.createElement('a');
                    link.href = `#${id}`;
                    link.className = "vivid-btn";
                    link.innerHTML = `🍀 ${p.title}`;
                    nav.prepend(link);

                    return `
                        <article id="${id}" class="card-vivid p-6 md:p-10 mb-10">
                            <div class="flex items-center gap-4 mb-8">
                                <div class="w-12 h-12 bg-emerald-500/20 rounded-full flex items-center justify-center text-emerald-500 font-bold">U</div>
                                <div>
                                    <h2 class="text-2xl md:text-3xl font-black text-white">${p.title}</h2>
                                    <span class="text-[10px] text-emerald-600 font-bold uppercase tracking-widest">${p.date}</span>
                                </div>
                            </div>
                            <div class="prose-content text-gray-300 text-lg leading-relaxed" onclick="checkImageClick(event)">
                                ${p.content}
                            </div>
                        </article>
                    `;
                }).join('');
            }
        }

        // РАСМНИ БОСИЛГАНИНИ ТЕКШИРИШ
        function checkImageClick(event) {
            if (event.target.tagName === 'IMG') {
                const fullImg = document.getElementById('full-image');
                const viewer = document.getElementById('image-viewer');
                fullImg.src = event.target.src;
                viewer.style.display = 'flex';
                document.body.style.overflow = 'hidden'; // Орқа фонд қимирламайди
            }
        }

        // КАТТА РАСМНИ ЁПИШ
        function closeImage() {
            document.getElementById('image-viewer').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onload = loadMedicalPosts;
    </script>
</body>
</html>
