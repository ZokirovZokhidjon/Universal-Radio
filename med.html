<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Табобат - Universal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #010409; color: #e6edf3; font-family: 'Segoe UI', sans-serif; }
        .glass-card { 
            background: #0d1117; 
            border: 1px solid #30363d; 
            border-radius: 15px; 
            margin-bottom: 20px;
            overflow: hidden;
        }
        .post-content img { max-width: 100%; height: auto; border-radius: 10px; margin: 15px 0; }
        .post-content { font-size: 14px; line-height: 1.6; color: #8b949e; }
        .post-content h1, .post-content h2 { color: white; font-weight: bold; margin-top: 10px; }
        .gold-text { color: #ffcc00; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-gray-800 pb-4">
            <a href="index.html" class="text-gray-500 hover:text-white transition">
                <i class="fas fa-arrow-left"></i> Ортга
            </a>
            <h1 class="text-xl font-bold uppercase gold-text">Табобат Рукни</h1>
            <div></div>
        </header>

        <div id="med-posts-container">
            <p class="text-center text-gray-600 italic">Мақолалар қидирилмоқда...</p>
        </div>
    </div>

    <script>
        function loadMedPosts() {
            const container = document.getElementById('med-posts-container');
            // Админдан келаётган барча мақолаларни олиш
            const posts = JSON.parse(localStorage.getItem('my_site_posts') || '[]');
            
            // Фақат "Табобат" категориясига тегишлиларини ажратиб олиш
            const medPosts = posts.filter(p => p.category === 'Табобат');

            if (medPosts.length === 0) {
                container.innerHTML = `
                    <div class="text-center p-10">
                        <i class="fas fa-folder-open text-4xl text-gray-700 mb-4"></i>
                        <p class="text-gray-500">Ҳозирча бу бўлимда мақолалар йўқ.</p>
                    </div>
                `;
                return;
            }

            // Мақолаларни вақтига қараб тескари тартибда (янгиси тепада) чиқариш
            container.innerHTML = medPosts.reverse().map(post => `
                <article class="glass-card p-6">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[10px] font-bold text-green-500 uppercase tracking-widest">
                            <i class="fas fa-calendar-alt"></i> ${post.date || 'Санасиз'}
                        </span>
                    </div>
                    
                    <h2 class="text-2xl font-bold text-white mb-4">${post.title}</h2>
                    
                    ${post.image ? `<img src="${post.image}" class="w-full h-auto rounded-xl mb-6 border border-gray-800" alt="post image">` : ''}
                    
                    <div class="post-content">
                        ${post.content}
                    </div>
                    
                    <div class="mt-6 pt-4 border-t border-gray-800 flex justify-between items-center">
                        <span class="text-[10px] text-gray-600">Рукн: Табобат</span>
                        <div class="flex gap-4">
                            <i class="far fa-heart text-gray-500 cursor-pointer hover:text-red-500"></i>
                            <i class="far fa-share-square text-gray-500 cursor-pointer hover:text-blue-500"></i>
                        </div>
                    </div>
                </article>
            `).join('');
        }

        // Саҳифа юкланганда мақолаларни чиқариш
        window.onload = loadMedPosts;
    </script>
</body>
</html>
