<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Табобат - Universal Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #010409; color: #e6edf3; font-family: 'Segoe UI', sans-serif; scroll-behavior: smooth; }
        .glass-card { background: #0d1117; border: 1px solid #30363d; border-radius: 12px; }
        .stat-card { background: #0d1117; border: 1px solid #30363d; border-radius: 12px; text-align: center; }
        
        .post-image { 
            width: 100%; 
            max-height: 500px; 
            object-fit: cover; 
            border-radius: 15px; 
            border: 3px groove gold; 
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.15); 
            margin-bottom: 20px; 
        }

        .sidebar-item { border-bottom: 1px solid #30363d; padding: 12px 0; transition: 0.3s; cursor: pointer; display: block; text-decoration: none; }
        .sidebar-item:hover { background: rgba(255,255,255,0.05); padding-left: 8px; }
        
        .gold-text { color: #ffcc00; }
        article:target { border-color: #ffcc00; }
        
        /* Мобил қурилмалар учун матн созламалари */
        @media (max-width: 768px) {
            .post-content { font-size: 16px !important; line-height: 1.6; }
            .post-title { font-size: 22px !important; }
        }
    </style>
</head>
<body class="p-3 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center gap-4 mb-8">
            <div class="text-center md:text-left">
                <h1 class="text-xl md:text-3xl font-black tracking-tighter uppercase">UNIVERSAL <span class="gold-text">STUDIO</span></h1>
                <p class="text-[9px] md:text-xs text-gray-500 uppercase tracking-[3px]">Табобат бўлими</p>
            </div>
            <a href="index.html" class="w-full md:w-auto text-center bg-[#161b22] px-6 py-2 md:py-3 rounded-xl text-xs font-bold border border-[#30363d] hover:bg-white hover:text-black transition uppercase">Асосий саҳифа</a>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 md:gap-6 mb-8">
            <div class="stat-card p-4 md:p-6 border-b-2 border-blue-500 md:border-b-0">
                <p class="text-[10px] md:text-xs text-gray-500 uppercase font-bold mb-1">Мақолалар</p>
                <h2 id="total-count" class="text-xl md:text-3xl font-black text-blue-500">0</h2>
            </div>
            <div class="stat-card p-4 md:p-6 border-b-2 border-purple-500 md:border-b-0">
                <p class="text-[10px] md:text-xs text-gray-500 uppercase font-bold mb-1">Рукн</p>
                <h2 class="text-xl md:text-3xl font-black text-purple-500">Табобат</h2>
            </div>
            <div class="stat-card p-4 md:p-6 border-b-2 border-green-500 md:border-b-0">
                <p class="text-[10px] md:text-xs text-gray-500 uppercase font-bold mb-1">Сана</p>
                <h2 class="text-lg md:text-2xl font-black text-green-500" id="current-date"></h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 md:gap-10">
            
            <div class="lg:col-span-2 order-1" id="med-posts-container"></div>

            <div class="lg:col-span-1 order-2">
                <div class="glass-card p-5 md:p-6 sticky top-6">
                    <h3 class="text-sm md:text-lg font-bold uppercase gold-text mb-4 flex items-center gap-2">
                        <i class="fas fa-bolt text-xs"></i> Сўнгги хабарлар
                    </h3>
                    <div id="sidebar-posts" class="max-h-[400px] overflow-y-auto pr-2">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('uz-UZ');

        function loadMedPage() {
            const allPosts = JSON.parse(localStorage.getItem('my_site_posts') || '[]');
            const medPosts = allPosts.filter(p => p.category === 'Табобат').reverse();
            const container = document.getElementById('med-posts-container');
            const sidebar = document.getElementById('sidebar-posts');
            const totalLabel = document.getElementById('total-count');

            totalLabel.innerText = medPosts.length;

            if (medPosts.length === 0) {
                container.innerHTML = "<p class='text-gray-600 text-center py-10 italic'>Ҳозирча мақолалар йўқ.</p>";
                return;
            }

            container.innerHTML = medPosts.map(post => `
                <article id="post-${post.id}" class="glass-card p-5 md:p-8 mb-6 md:mb-10 transition-all border-l-4 border-transparent hover:border-blue-500">
                    <p class="text-[10px] md:text-xs text-gray-500 mb-3 font-mono uppercase tracking-widest italic">
                        <i class="far fa-calendar-alt"></i> ${post.date}
                    </p>
                    <h2 class="post-title text-xl md:text-4xl font-extrabold mb-5 text-white leading-tight">${post.title}</h2>
                    
                    ${post.image ? `<img src="${post.image}" class="post-image" alt="image">` : ''}
                    
                    <div class="post-content text-[17px] md:text-xl text-gray-300 leading-relaxed mb-8">
                        ${post.content}
                    </div>
                    
                    <div class="flex justify-between items-center border-t border-gray-800 pt-5">
                        <button class="flex items-center gap-2 text-gray-500 hover:text-red-500 transition text-sm">
                            <i class="far fa-heart"></i> <span class="hidden md:inline">Лайк</span>
                        </button>
                        <button onclick="sharePost('${post.title}', ${post.id})" class="flex items-center gap-2 text-gray-500 hover:text-blue-500 transition text-sm">
                            <i class="fas fa-share-alt"></i> <span class="hidden md:inline">Улашиш</span>
                        </button>
                    </div>
                </article>
            `).join('');

            sidebar.innerHTML = medPosts.slice(0, 10).map(post => `
                <a href="#post-${post.id}" class="sidebar-item group">
                    <p class="text-[9px] text-gray-600 mb-1">${post.date}</p>
                    <h4 class="text-[13px] md:text-[15px] font-semibold text-gray-400 group-hover:text-yellow-500 transition leading-snug">
                        ${post.title}
                    </h4>
                </a>
            `).join('');
        }

        function sharePost(title, id) {
            const url = window.location.href.split('#')[0] + '#post-' + id;
            window.open(`https://t.me/share/url?url=${url}&text=${encodeURIComponent(title)}`, '_blank');
        }

        window.onload = loadMedPage;
    </script>
</body>
</html>
