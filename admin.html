<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Universal Pro Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <style>
        body { background: #010409; font-family: 'Inter', sans-serif; color: white; }
        .ql-container { height: 300px; background: white; color: black; border-radius: 0 0 12px 12px; }
        .ql-toolbar { background: #eee; border-radius: 12px 12px 0 0; }
        .admin-card { background: #0d1117; border: 1px solid #30363d; border-radius: 20px; padding: 24px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
            <h1 class="text-2xl font-black text-yellow-500 italic">UNIVERSAL ADMIN CONTROL</h1>
            <button onclick="logout()" class="text-xs bg-red-600 px-4 py-2 rounded-full font-bold">ЧИҚИШ</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="admin-card space-y-4">
                <h2 class="text-yellow-500 font-bold uppercase text-xs mb-4">Янги мақола яратиш</h2>
                
                <input type="text" id="postTitle" placeholder="Сарлавҳа..." class="w-full bg-black border border-gray-700 p-3 rounded-xl outline-none focus:border-yellow-600">
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] text-gray-500 uppercase">Расм юклаш</label>
                        <input type="file" id="postFile" accept="image/*" onchange="encodeFile('image')" class="text-xs text-gray-400">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] text-gray-500 uppercase">Видео юклаш</label>
                        <input type="file" id="postVideo" accept="video/*" onchange="encodeFile('video')" class="text-xs text-gray-400">
                    </div>
                </div>

                <input type="text" id="postSource" placeholder="Манба (Ссылка)..." class="w-full bg-black border border-gray-700 p-3 rounded-xl outline-none text-xs">
                
                <select id="postCategory" class="w-full bg-black border border-gray-700 p-3 rounded-xl outline-none">
                    <option>Янгиликлар</option>
                    <option>Табобат</option>
                    <option>Шеърият</option>
                    <option>Кулинария</option>
                    <option>Балиқ ови</option>
                    <option>Хикоялар]</option>
                </select>

                <div id="editor"></div>
                
                <button onclick="savePost()" class="w-full bg-yellow-600 hover:bg-yellow-500 text-black font-black py-4 rounded-xl transition-all">САЙТГА ЖОЙЛАШ</button>
            </div>

            <div class="admin-card">
                <h2 class="text-white font-bold uppercase text-xs mb-6 border-l-4 border-yellow-500 pl-3">Мақолалар бошқаруви</h2>
                <div id="archiveList" class="space-y-3 max-h-[700px] overflow-y-auto pr-2"></div>
            </div>
        </div>
    </div>

    <script>
        var quill = new Quill('#editor', {
            theme: 'snow',
            modules: { toolbar: [ [{ 'header': [1, 2, false] }], ['bold', 'italic', 'underline'], [{ 'color': [] }, { 'background': [] }], [{ 'list': 'ordered'}, { 'list': 'bullet' }], ['clean'] ] }
        });

        let mediaData = { image: "", video: "" };
        let editIndex = null;

        function encodeFile(type) {
            const file = document.getElementById(type === 'image' ? 'postFile' : 'postVideo').files[0];
            const reader = new FileReader();
            reader.onloadend = () => { mediaData[type] = reader.result; };
            if (file) reader.readAsDataURL(file);
        }

        function savePost() {
            const title = document.getElementById('postTitle').value;
            const category = document.getElementById('postCategory').value;
            const source = document.getElementById('postSource').value;
            const content = quill.root.innerHTML;
            const posts = JSON.parse(localStorage.getItem('my_site_posts') || '[]');

            const postObj = { title, category, source, content, image: mediaData.image, video: mediaData.video, date: new Date().toLocaleDateString() };

            if (editIndex !== null) {
                posts[editIndex] = postObj;
                editIndex = null;
            } else {
                posts.push(postObj);
            }

            localStorage.setItem('my_site_posts', JSON.stringify(posts));
            alert("Сақланди!");
            location.reload();
        }

        function displayArchive() {
            const posts = JSON.parse(localStorage.getItem('my_site_posts') || '[]');
            const list = document.getElementById('archiveList');
            list.innerHTML = posts.map((p, i) => `
                <div class="bg-black/40 border border-gray-800 p-4 rounded-xl flex justify-between items-center">
                    <div class="truncate mr-4">
                        <p class="text-[10px] text-yellow-600 font-bold">${p.category}</p>
                        <h3 class="text-sm font-bold truncate">${p.title}</h3>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editPost(${i})" class="text-blue-500 text-[10px] font-bold uppercase">Таҳрир</button>
                        <button onclick="deletePost(${i})" class="text-red-500 text-[10px] font-bold uppercase">Ўчириш</button>
                    </div>
                </div>
            `).reverse().join('');
        }

        function editPost(i) {
            const posts = JSON.parse(localStorage.getItem('my_site_posts') || '[]');
            const p = posts[i];
            document.getElementById('postTitle').value = p.title;
            document.getElementById('postCategory').value = p.category;
            document.getElementById('postSource').value = p.source;
            quill.root.innerHTML = p.content;
            mediaData.image = p.image;
            mediaData.video = p.video;
            editIndex = i;
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function deletePost(i) {
            if(confirm("Ўчирилсинми?")) {
                let posts = JSON.parse(localStorage.getItem('my_site_posts') || '[]');
                posts.splice(i, 1);
                localStorage.setItem('my_site_posts', JSON.stringify(posts));
                displayArchive();
            }
        }

        function logout() { window.location.href = "index.html"; }
        window.onload = displayArchive;
    </script>
</body>
</html>
