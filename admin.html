<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #252525; padding: 20px; border-radius: 10px; border: 1px solid #444; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; background: #000; color: white; border: 1px solid #555; box-sizing: border-box; }
        textarea { height: 200px; }
        .save-btn { background: #28a745; color: white; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; }
        .post-item { border-bottom: 1px solid #444; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .edit-btn { background: #007bff; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; margin-right: 5px; }
        .del-btn { background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h2>✍️ Мақола қўшиш</h2>
        <input type="text" id="post_title" placeholder="Сарлавҳа...">
        <select id="post_cat">
            <option value="news">Янгиликлар</option>
            <option value="med">Табобат</option>
            <option value="fish">Балиқ ови</option>
        </select>
        
        <label>🖼 Расм танлаш:</label>
        <input type="file" id="img_input" accept="image/*" onchange="uploadImage()">
        
        <textarea id="post_text" placeholder="Матнни шу ерга ёзинг..."></textarea>
        
        <button class="save-btn" id="save_button" onclick="saveData()">САҚЛАШ / ЖОЙЛАШ</button>
    </div>

    <div class="card">
        <h3>📁 Сақланган мақолалар:</h3>
        <div id="posts_display"></div>
    </div>

<script>
    // Маълумотларни хотирадан олиш
    var all_posts = JSON.parse(localStorage.getItem('my_site_data') || '[]');
    var current_edit_id = -1;

    // Расмни матнга айлантириш
    function uploadImage() {
        var file = document.getElementById('img_input').files[0];
        var reader = new FileReader();
        reader.onload = function(e) {
            var area = document.getElementById('post_text');
            area.value += '\n<img src="' + e.target.result + '" style="width:100%">\n';
        };
        if(file) reader.readAsDataURL(file);
    }

    // Сақлаш функцияси
    function saveData() {
        var t = document.getElementById('post_title').value;
        var m = document.getElementById('post_text').value;
        var c = document.getElementById('post_cat').value;

        if(!t || !m) { alert('Илтимос, тўлдиринг!'); return; }

        var item = { title: t, text: m, cat: c, time: new Date().toLocaleString() };

        if(current_edit_id > -1) {
            all_posts[current_edit_id] = item;
            current_edit_id = -1;
            document.getElementById('save_button').innerText = "САҚЛАШ / ЖОЙЛАШ";
        } else {
            all_posts.unshift(item);
        }

        localStorage.setItem('my_site_data', JSON.stringify(all_posts));
        alert('Сақланди!');
        
        // Формани тозалаш
        document.getElementById('post_title').value = '';
        document.getElementById('post_text').value = '';
        showData();
    }

    // Рўйхатни чиқариш
    function showData() {
        var container = document.getElementById('posts_display');
        var html = '';
        
        if(all_posts.length === 0) {
            container.innerHTML = "Ҳозирча мақолалар йўқ.";
            return;
        }

        for(var i=0; i < all_posts.length; i++) {
            html += '<div class="post-item">' +
                    '<div><b>' + all_posts[i].title + '</b><br><small>' + all_posts[i].time + '</small></div>' +
                    '<div>' +
                    '<button class="edit-btn" onclick="editItem(' + i + ')">✏️</button>' +
                    '<button class="del-btn" onclick="deleteItem(' + i + ')">🗑</button>' +
                    '</div></div>';
        }
        container.innerHTML = html;
    }

    // Таҳрирлаш
    window.editItem = function(index) {
        var p = all_posts[index];
        document.getElementById('post_title').value = p.title;
        document.getElementById('post_text').value = p.text;
        document.getElementById('post_cat').value = p.cat;
        current_edit_id = index;
        document.getElementById('save_button').innerText = "ЎЗГАРИШНИ САҚЛАШ";
        window.scrollTo(0,0);
    };

    // Ўчириш
    window.deleteItem = function(index) {
        if(confirm('Ўчирилсинми?')) {
            all_posts.splice(index, 1);
            localStorage.setItem('my_site_data', JSON.stringify(all_posts));
            showData();
        }
    };

    // Ишни бошлаш
    showData();
</script>

</body>
</html>
