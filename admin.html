<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Admin Pro - Full Media Control</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <style>
        body { background: #010409; font-family: 'Inter', sans-serif; color: white; }
        /* Муҳаррир баландлиги ва оқ фони */
        .ql-container { height: 350px; background: white; color: black; border-radius: 0 0 12px 12px; }
        .ql-toolbar { background: #f0f0f0; border-radius: 12px 12px 0 0; border: none !important; }
        .admin-card { background: #0d1117; border: 1px solid #30363d; border-radius: 20px; padding: 24px; }
        
        /* Инпутлар учун махсус қора услуб */
        input, select, textarea { 
            background: #000 !important; 
            color: white !important; 
            border: 1px solid #30363d !important; 
        }
        
        /* Муҳаррир ичидаги матн ўлчами */
        .ql-editor { font-size: 18px; }
        
        /* Скроллбарни чиройли қилиш */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
            <div>
                <h1 class="text-2xl font-black text-yellow-500 italic uppercase">Universal Admin</h1>
                <p class="text-[10px] text-gray-500 font-bold tracking-[3px]">IFRAME & MEDIA SUPPORT</p>
            </div>
            <button onclick="logout()" class="text-xs bg-red-600 px-6 py-2 rounded-full font-bold hover:bg-red-700 transition-all shadow-lg shadow-red-900/20 uppercase">Чиқиш</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <div class="admin-card space-y-4">
                <h2 id="formTitle" class="text-yellow-500 font-bold uppercase text-[10px] tracking-widest mb-2 border-l-4 border-yellow-500 pl-2">Янги мақола қўшиш</h2>
                
                <input type="text" id="postTitle" placeholder="Мақола сарлавҳаси..." class="w-full p-3 rounded-xl outline-none focus:border-yellow-600 font-bold text-lg transition-all">
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] text-gray-500 uppercase font-bold italic">Асосий расм (Preview)</label>
                        <input type="file" id="postFile" accept="image/*" onchange="encodeFile()" class="text-xs w-full cursor-pointer file:bg-gray-800 file:text-white file:border-none file:px-3 file:py-1 file:rounded-md">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] text-gray-500 uppercase font-bold italic">Рукнни танланг</label>
                        <select id="postCategory" class="w-full p-2 rounded-lg outline-none text-sm font-bold">
                            <option>Янгиликлар</option>
                            <option>Табобат</option>
                            <option>Шеърият</option>
                            <option>Кулинария</option>
                            <option>Балиқ ови</option>
                            <option>Ҳикоялар</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] text-blue-400 uppercase font-bold">Манба ҳаволаси (Link)</label>
                    <input type="text" id="postSource" placeholder="https://kun.uz ёки манба номи" class="w-full p-3 rounded-xl outline-none text-xs italic">
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] text-red-500 uppercase font-bold italic">YouTube Iframe (Видео код)</label>
                    <textarea id="postIframe" placeholder='<iframe src="..."></iframe> кодини шу ерга қўйинг' class="w-full p-3 rounded-xl outline-none text-[10px] h-16 font-mono"></textarea>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] text-gray-500 uppercase font-bold italic">Мақола матни (Ранг, ҳажм ва медиа)</label>
                    <div id="editor"></div>
                </div>
                
                <div class="flex gap-2 pt-4">
                    <button id="mainBtn" onclick="savePost()" class="flex-1 bg-yellow-600 hover:bg-yellow-500 text-black font-black py-4 rounded-xl transition-all uppercase tracking-widest text-sm shadow-xl">Сайтга жойлаштириш</button>
                    <button id="cancelBtn" onclick="resetForm()" class="hidden bg-gray-800 hover:bg-gray-700 text-white px-6 py-4 rounded-xl text-xs font-bold uppercase transition-all">Бекор қилиш</button>
                </div>
            </div>

            <div class="admin-card">
                <h2 class="text-white font-bold uppercase text-[10px] tracking-[4px] mb-6 border-l-4 border-yellow-500 pl-3 italic">Бошқарув панели</h2>
                <div id="archiveList" class="space-y-3 max-h-[900px] overflow-y-auto pr-2">
                    </div>
            </div>

        </div>
    </div>

    <script>
        // Quill Муҳарририни тўлиқ имкониятлар билан ёқиш
        var quill = new Quill('#editor', {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, 4, false] }], // Матн катта-кичиклиги
                    ['bold', 'italic', 'underline', 'strike'], // Форматлаш
                    [{ 'color': [] }, { 'background': [] }], // Матн ранги ва фон ранги
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }], // Рўйхатлар
                    [{ 'align': [] }], // Матнни текислаш
                    ['link', 'image', 'video'], // Ҳавола, расм ва видео
                    ['clean'] // Тозалаш
                ]
            }
        });

        let mediaData = { image: "" };
        let editIndex = null;

        // Расмни Base64 га ўтказиш
        function encodeFile() {
            const file = document.getElementById('postFile').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onloadend = () => { mediaData.image = reader.result; };
                reader.readAsDataURL(file);
            }
        }

        // Сақлаш функцияси
        function savePost() {
            const title = document.getElementById('postTitle').value;
            const category = document.getElementById('postCategory').value;
            const source = document.getElementById('postSource').value;
            const iframe = document.getElementById('postIframe').value;
            const content = quill.root.innerHTML;
            
            if(!title || content === "<p><br></p>") {
                alert("Илтимос, сарлавҳа ва асосий матнни киритинг!");
                return;
            }

            let posts = JSON.parse(localStorage.getItem('my_site_posts') || '[]');

            const postObj = { 
                title, category, source, iframe, content, 
                image: mediaData.image, 
                date: editIndex !== null ? posts[editIndex].date : new Date().toLocaleDateString() 
            };

            if (editIndex !== null) {
                posts[editIndex] = postObj;
                editIndex = null;
            } else {
                posts.push(postObj);
            }

            localStorage.setItem('my_site_posts', JSON.stringify(posts));
            resetForm();
            displayArchive();
            alert("Мақола муваффақиятли сақланди!");
        }

        // Рўйхатни кўрсатиш
        function displayArchive() {
            const posts = JSON.parse(localStorage.getItem('my_site_posts') || '[]');
            const list = document.getElementById('archiveList');
            
            list.innerHTML = posts.map((p, i) => ({...p, originalIndex: i}))
                .reverse()
                .map(p => `
                    <div class="bg-black/40 border border-gray-800 p-4 rounded-2xl flex justify-between items-center group hover:border-yellow-900 transition-all">
                        <div class="truncate mr-4">
                            <span class="text-[8px] bg-yellow-950 text-yellow-500 px-2 py-0.5 rounded-full font-bold uppercase tracking-widest">${p.category}</span>
                            <h3 class="text-sm font-bold truncate text-gray-200 mt-1">${p.title}</h3>
                            <p class="text-[8px] text-gray-600 mt-1">${p.date}</p>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="editPost(${p.originalIndex})" class="text-blue-500 text-[10px] font-black uppercase hover:underline">Таҳрир</button>
                            <button onclick="deletePost(${p.originalIndex})" class="text-red-600 text-[10px] font-black uppercase hover:underline">Ўчириш</button>
                        </div>
                    </div>
                `).join('');
        }

        // Таҳрирлаш режими
        function editPost(i) {
            const posts = JSON.parse(localStorage.getItem('my_site_posts') || '[]');
            const p = posts[i];
            
            document.getElementById('postTitle').value = p.title;
            document.getElementById('postCategory').value = p.category;
            document.getElementById('postSource').value = p.source;
            document.getElementById('postIframe').value = p.iframe || "";
            quill.root.innerHTML = p.content;
            mediaData.image = p.image;
            
            editIndex = i;
            document.getElementById('formTitle').innerText = "Мақолани таҳрирлаш";
            document.getElementById('mainBtn').innerText = "Ўзгартиришни сақлаш";
            document.getElementById('cancelBtn').classList.remove('hidden');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        // Формани тозалаш
        function resetForm() {
            document.getElementById('postTitle').value = "";
            document.getElementById('postSource').value = "";
            document.getElementById('postIframe').value = "";
            document.getElementById('postFile').value = "";
            quill.root.innerHTML = "";
            mediaData = { image: "" };
            editIndex = null;
            document.getElementById('formTitle').innerText = "Янги мақола қўшиш";
            document.getElementById('mainBtn').innerText = "Сайтга жойлаштириш";
            document.getElementById('cancelBtn').classList.add('hidden');
        }

        // Ўчириш
        function deletePost(i) {
            if(confirm("Ростан ҳам ушбу мақолани ўчирмоқчимисиз?")) {
                let posts = JSON.parse(localStorage.getItem('my_site_posts') || '[]');
                posts.splice(i, 1);
                localStorage.setItem('my_site_posts', JSON.stringify(posts));
                displayArchive();
            }
        }

        // Чиқиш
        function logout() { 
            if(confirm("Админ панелдан чиқмоқчимисиз?")) {
                window.location.href = "index.html"; 
            }
        }

        // Саҳифа юкланганда архивни чиқариш
        window.onload = displayArchive;
    </script>
</body>
</html>
