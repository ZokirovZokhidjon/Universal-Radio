<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Universal Admin v13.0</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: Arial, sans-serif; padding: 20px; }
        .box { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        textarea { height: 250px; }
        .btn { background: #238636; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .post { border-bottom: 1px solid #30363d; padding: 10px; display: flex; justify-content: space-between; }
        .del-btn { background: #da3633; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .edit-btn { background: #1f6feb; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-right: 5px; }
        img { max-width: 100%; height: auto; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>✍️ Янги мақола</h2>
        <input type="text" id="t" placeholder="Сарлавҳа...">
        <select id="c">
            <option value="news">Янгиликлар</option>
            <option value="med">Табобат</option>
            <option value="baliq-ovi">Балиқ ови</option>
            <option value="hikoyalar">Ҳикоялар</option>
        </select>
        
        <input type="file" id="i" accept="image/*" onchange="uploadImg()">
        <p style="font-size: 11px; color: gray;">(Расм танласангиз, коди матнга автоматик тушади)</p>

        <textarea id="txt" placeholder="Матн ёзинг..."></textarea>
        <button class="btn" onclick="save()">САЙТГА ЖОЙЛАШ</button>
    </div>

    <div class="box">
        <h3>📁 Мақолалар рўйхати</h3>
        <div id="list"></div>
    </div>

<script>
    var posts = JSON.parse(localStorage.getItem('myPosts') || '[]');
    var editId = -1;

    function uploadImg() {
        var file = document.getElementById('i').files[0];
        var reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('txt').value += '\n<img src="' + e.target.result + '">\n';
        };
        reader.readAsDataURL(file);
    }

    function save() {
        var t = document.getElementById('t').value;
        var m = document.getElementById('txt').value;
        var c = document.getElementById('c').value;

        if(!t || !m) { alert('Тўлдиринг!'); return; }

        var p = { title: t, text: m, cat: c, date: new Date().toLocaleString() };

        if(editId > -1) {
            posts[editId] = p;
            editId = -1;
        } else {
            posts.unshift(p);
        }

        localStorage.setItem('myPosts', JSON.stringify(posts));
        location.reload(); // Саҳифани янгилаб, маълумотни янгилаймиз
    }

    function show() {
        var out = '';
        for(var i=0; i<posts.length; i++) {
            out += '<div class="post"><span><b>' + posts[i].title + '</b><br><small>' + posts[i].date + '</small></span>' +
                   '<div><button class="edit-btn" onclick="edit(' + i + ')">✏️</button>' +
                   '<button class="del-btn" onclick="del(' + i + ')">🗑</button></div></div>';
        }
        document.getElementById('list').innerHTML = out || 'Мақолалар йўқ.';
    }

    window.edit = function(i) {
        document.getElementById('t').value = posts[i].title;
        document.getElementById('txt').value = posts[i].text;
        document.getElementById('c').value = posts[i].cat;
        editId = i;
        window.scrollTo(0,0);
    };

    window.del = function(i) {
        if(confirm('Ўчирилсинми?')) {
            posts.splice(i, 1);
            localStorage.setItem('myPosts', JSON.stringify(posts));
            location.reload();
        }
    };

    show();
</script>

</body>
</html>
