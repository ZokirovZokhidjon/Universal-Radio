<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Admin v6.0 - Real Statistics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        body { background: #010409; color: #e6edf3; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .glass-panel { background: #0d1117; border: 1px solid #30363d; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        #editor-container { height: 300px; background: #ffffff; color: #000000; border-radius: 0 0 12px 12px; }
        .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 15px; text-align: center; }
    </style>
</head>
<body>

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-bold text-blue-500 uppercase">Universal Admin</h1>
        <button onclick="window.location.href='index.html'" class="bg-red-600 px-4 py-2 rounded-lg text-xs font-bold uppercase">Чиқиш</button>
    </div>

    <div class="grid grid-cols-12 gap-6">
        
        <div class="col-span-12 lg:col-span-8">
            <div class="glass-panel shadow-2xl">
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <input type="text" id="postTitle" placeholder="Сарлавҳа..." class="col-span-2 md:col-span-1 bg-[#161b22] border border-[#30363d] rounded-xl p-3 text-sm text-white outline-none focus:border-blue-500">
                    <select id="postCat" class="col-span-2 md:col-span-1 bg-[#161b22] border border-[#30363d] rounded-xl p-3 text-sm text-white outline-none">
                        <option value="index.html">Асосий саҳифа</option>
                        <option value="news.html">Янгиликлар</option>
                        <option value="tabobat.html">Табобат</option>
                        <option value="she'riyat.html">Шеърият</option>
                    </select>
                </div>
                <div id="editor-container"></div>
                <button onclick="savePost()" class="w-full mt-4 bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold uppercase text-xs transition">
                    <i class="fas fa-check-circle mr-2"></i> Нашр қилиш
                </button>
            </div>

            <div class="glass-panel">
                <h3 class="text-xs font-bold text-gray-500 uppercase mb-4">Мақолаларни таҳрирлаш</h3>
                <div id="admin-posts-list" class="space-y-2"></div>
            </div>
        </div>

        <div class="col-span-12 lg:col-span-4 space-y-6">
            
            <div class="glass-panel">
                <h3 class="text-emerald-400 font-bold mb-4 uppercase text-[10px] flex items-center gap-2">
                    <i class="fas fa-users"></i> Кирувчилар ва Кўришлар
                </h3>
                
                <div class="stat-card bg-[#0d1117] flex flex-col items-center">
                    <p class="text-[10px] text-gray-400 mb-3 uppercase">Реал вақтдаги статистика:</p>
                    
                    <a href="https://info.flagcounter.com/8uM1">
                        <img src="https://s11.flagcounter.com/count2/8uM1/bg_0D1117/txt_FFFFFF/border_30363D/columns_2/maxflags_10/viewers_3/labels_1/pageviews_1/flags_0/percent_0/" alt="Flag Counter" border="0">
                    </a>
                    
                    <p class="text-[9px] text-gray-500 mt-4 leading-relaxed">
                        Юқоридаги жадвалда сайтга кирганлар сони (Viewers) ва жами кўрилган саҳифалар (Pageviews) реал вақтда ҳисобланади.
                    </p>
                </div>
            </div>

            <div class="glass-panel">
                <h3 class="text-purple-400 font-bold mb-4 uppercase text-[10px] flex items-center gap-2">
                    <i class="fas fa-music"></i> Плеер
                </h3>
                <audio id="mainAudio" controls class="w-full mb-4 h-8"></audio>
                <div id="playlist" class="mt-4 max-h-[100px] overflow-y-auto space-y-1"></div>
            </div>

        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script>
        var quill = new Quill('#editor-container', {
            theme: 'snow',
            modules: { toolbar: [[{ 'header': [1, 2, false] }], ['bold', 'italic', 'underline'], ['image', 'clean']] }
        });

        function savePost() {
            const title = document.getElementById('postTitle').value;
            const category = document.getElementById('postCat').value;
            const content = quill.root.innerHTML;
            if (!title || content === '<p><br></p>') return alert("Тўлдиринг!");

            let posts = JSON.parse(localStorage.getItem('myPosts') || '[]');
            posts.unshift({ title, category, content, date: new Date().toLocaleString() });
            localStorage.setItem('myPosts', JSON.stringify(posts));
            
            alert("Сақланди!");
            location.reload();
        }

        function renderAdminPosts() {
            const list = document.getElementById('admin-posts-list');
            const posts = JSON.parse(localStorage.getItem('myPosts') || '[]');
            list.innerHTML = posts.map((post, i) => `
                <div class="flex justify-between items-center bg-[#161b22] p-3 rounded-xl border border-[#30363d]">
                    <div class="truncate"><p class="text-xs font-bold text-gray-200">${post.title}</p></div>
                    <div class="flex gap-2">
                        <button onclick="editPost(${i})" class="text-blue-500 p-2 hover:bg-blue-900/20 rounded-lg"><i class="fas fa-edit text-xs"></i></button>
                        <button onclick="deletePost(${i})" class="text-red-500 p-2 hover:bg-red-900/20 rounded-lg"><i class="fas fa-trash text-xs"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function editPost(i) {
            const posts = JSON.parse(localStorage.getItem('myPosts') || '[]');
            const p = posts[i];
            document.getElementById('postTitle').value = p.title;
            document.getElementById('postCat').value = p.category;
            quill.root.innerHTML = p.content;
            posts.splice(i, 1);
            localStorage.setItem('myPosts', JSON.stringify(posts));
            renderAdminPosts();
        }

        function deletePost(i) {
            if(confirm("Ўчирилсинми?")) {
                let posts = JSON.parse(localStorage.getItem('myPosts') || '[]');
                posts.splice(i, 1);
                localStorage.setItem('myPosts', JSON.stringify(posts));
                renderAdminPosts();
            }
        }

        window.onload = renderAdminPosts;
    </script>
</body>
</html>
