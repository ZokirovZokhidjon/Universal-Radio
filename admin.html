<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Control Center v5.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        body { background: #010409; color: #e6edf3; font-family: 'Segoe UI', sans-serif; min-height: 100vh; padding: 20px; }
        .glass-panel { background: #0d1117; border: 1px solid #30363d; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        #editor-container { height: 350px; background: #ffffff; color: #000000; border-radius: 0 0 12px 12px; }
        .ql-toolbar.ql-snow { background: #f8f9fa; border-radius: 12px 12px 0 0; border: 1px solid #30363d !important; }
        .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 10px; text-align: center; }
        select option { background: #0d1117; color: white; }
    </style>
</head>
<body>

    <div class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold text-blue-500 uppercase tracking-widest">Universal Studio Admin</h1>
        </div>
        <button onclick="logout()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg text-xs font-bold uppercase transition">Чиқиш</button>
    </div>

    <div class="grid grid-cols-12 gap-6">
        
        <div class="col-span-12 lg:col-span-8">
            <div class="glass-panel">
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <input type="text" id="postTitle" placeholder="Сарлавҳа..." class="col-span-2 md:col-span-1 bg-[#161b22] border border-[#30363d] rounded-xl p-3 text-sm text-white outline-none">
                    <select id="postCat" class="col-span-2 md:col-span-1 bg-[#161b22] border border-[#30363d] rounded-xl p-3 text-sm text-white outline-none">
                        <option value="index.html">Асосий саҳифа</option>
                        <option value="news.html">Янгиликлар</option>
                        <option value="tabobat.html">Табобат</option>
                        <option value="she'riyat.html">Шеърият</option>
                    </select>
                </div>
                <div id="editor-container"></div>
                <button onclick="savePost()" class="w-full mt-4 bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold uppercase text-xs transition">Нашр қилиш</button>
            </div>

            <div class="glass-panel">
                <h3 class="text-xs font-bold text-gray-500 uppercase mb-4">Нашр этилганлар</h3>
                <div id="admin-posts-list" class="space-y-2">
                    </div>
            </div>
        </div>

        <div class="col-span-12 lg:col-span-4 space-y-6">
            
            <div class="glass-panel">
                <h3 class="text-purple-400 font-bold mb-4 uppercase text-[10px] flex items-center gap-2">
                    <i class="fas fa-music"></i> Мусиқа бошқаруви
                </h3>
                <audio id="mainAudio" controls class="w-full mb-4 h-8"></audio>
                <label class="block bg-purple-600 hover:bg-purple-700 p-3 rounded-xl cursor-pointer text-center text-[10px] font-bold uppercase transition">
                    Файл танлаш (MP3) <input type="file" id="audioInput" hidden multiple accept="audio/*">
                </label>
                <div id="playlist" class="mt-4 max-h-[150px] overflow-y-auto space-y-2"></div>
            </div>

            <div class="glass-panel">
                <h3 class="text-emerald-400 font-bold mb-4 uppercase text-[10px] flex items-center gap-2">
                    <i class="fas fa-chart-line"></i> Статистика (Просмотр)
                </h3>
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <div class="stat-card">
                        <p class="text-[9px] text-gray-500 uppercase">Бугунги ташриф</p>
                        <p class="text-lg font-bold text-white">1,240</p>
                    </div>
                    <div class="stat-card">
                        <p class="text-[9px] text-gray-500 uppercase">Умумий кўриш</p>
                        <p class="text-lg font-bold text-blue-400">45,892</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script>
        // 1. Редакторни созлаш
        var quill = new Quill('#editor-container', {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, false] }],
                    ['bold', 'italic', 'underline'],
                    [{ 'color': [] }, { 'background': [] }],
                    [{ 'align': [] }],
                    ['image', 'clean']
                ]
            }
        });

        // 2. Мақолани сақлаш функцияси
        function savePost() {
            const title = document.getElementById('postTitle').value;
            const category = document.getElementById('postCat').value;
            const content = quill.root.innerHTML;
            const date = new Date().toLocaleString();

            if (!title || content === '<p><br></p>') {
                alert("Сарлавҳа ва матнни тўлдиринг!");
                return;
            }

            const newPost = { title, category, content, date };
            let posts = JSON.parse(localStorage.getItem('myPosts') || '[]');
            posts.unshift(newPost);
            localStorage.setItem('myPosts', JSON.stringify(posts));

            alert("Мақола " + category + " бўлимига сақланди!");
            
            // Тозалаш
            document.getElementById('postTitle').value = '';
            quill.setContents([]);
            renderAdminPosts();
        }

        // 3. Админ панелда мақолаларни чиқариш
        function renderAdminPosts() {
            const list = document.getElementById('admin-posts-list');
            const posts = JSON.parse(localStorage.getItem('myPosts') || '[]');
            
            if (posts.length === 0) {
                list.innerHTML = '<p class="text-center text-gray-600 text-xs italic">Ҳозирча мақолалар йўқ</p>';
                return;
            }

            list.innerHTML = posts.map((post, i) => `
                <div class="flex justify-between items-center bg-[#161b22] p-3 rounded-lg border border-[#30363d]">
                    <div>
                        <p class="text-sm font-bold text-white">${post.title}</p>
                        <p class="text-[10px] text-blue-500 uppercase">${post.category}</p>
                    </div>
                    <button onclick="deletePost(${i})" class="text-red-500 hover:text-red-400 p-2">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `).join('');
        }

        // 4. Мақолани ўчириш
        function deletePost(index) {
            if (confirm("Ушбу мақолани ўчиришни хоҳлайсизми?")) {
                let posts = JSON.parse(localStorage.getItem('myPosts') || '[]');
                posts.splice(index, 1);
                localStorage.setItem('myPosts', JSON.stringify(posts));
                renderAdminPosts();
            }
        }

        // 5. MP3 Плеер логикаси
        const audioInput = document.getElementById('audioInput');
        const audioPlayer = document.getElementById('mainAudio');
        const playlistDiv = document.getElementById('playlist');
        let tracks = [];

        audioInput.onchange = (e) => {
            Array.from(e.target.files).forEach(f => {
                tracks.push({ name: f.name, url: URL.createObjectURL(f) });
            });
            renderPlaylist();
        };

        function renderPlaylist() {
            playlistDiv.innerHTML = tracks.map((t, i) => `
                <div class="flex justify-between items-center bg-[#161b22] p-2 rounded border border-gray-800 hover:border-purple-500 transition">
                    <span onclick="playT(${i})" class="text-[10px] cursor-pointer text-gray-300 truncate w-4/5">▶ ${t.name}</span>
                    <i onclick="tracks.splice(${i},1);renderPlaylist()" class="fas fa-trash text-red-500 cursor-pointer text-[9px]"></i>
                </div>
            `).join('');
        }

        function playT(i) {
            audioPlayer.src = tracks[i].url;
            audioPlayer.play();
        }

        function logout() {
            window.location.href = "index.html";
        }

        window.onload = renderAdminPosts;
    </script>
</body>
</html>
