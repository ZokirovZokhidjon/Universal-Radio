<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Zokirov Creative - Admin Panel</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; --danger: #ef4444; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; background: #0f172a; color: white; border: 1px solid #334155; border-radius: 5px; }
        #editor { height: 200px; background: #0f172a; color: white; }
        .btn { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .post-item { background: var(--card); padding: 15px; margin-top: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--accent); }
        .del-btn { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1>Админ Панель</h1>
        <a href="news.html" style="color:var(--accent); text-decoration:none;">Сайтни кўриш →</a>
    </div>

    <div class="card">
        <label>Сарлавҳа:</label>
        <input type="text" id="title">
        
        <label>Бўлим:</label>
        <select id="category">
            <option>Янгиликлар</option>
            <option>Табобат</option>
            <option>Балиқ ови</option>
            <option>Ҳикоялар</option>
            <option>Шеърият</option>
        </select>

        <label>Расм ёки MP3 юклаш:</label>
        <input type="file" id="mediaFile" accept="image/*, audio/mp3">

        <label>Матн:</label>
        <div id="editor"></div>

        <button class="btn" onclick="savePost()">САЙТГА ЖОЙЛАШ</button>
    </div>

    <h3>Бошқарув</h3>
    <div id="adminList"></div>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script>
    var quill = new Quill('#editor', { theme: 'snow' });
    const storageKey = 'my_site_posts';

    function savePost() {
        const title = document.getElementById('title').value;
        const category = document.getElementById('category').value;
        const content = quill.root.innerHTML;
        const file = document.getElementById('mediaFile').files[0];

        if(!title || quill.getText().trim() === "") return alert("Тўлдиринг!");

        if(file) {
            const reader = new FileReader();
            reader.onload = (e) => finishSave(title, category, content, e.target.result, file.type);
            reader.readAsDataURL(file);
        } else {
            finishSave(title, category, content, null, null);
        }
    }

    function finishSave(title, category, content, media, type) {
        let posts = JSON.parse(localStorage.getItem(storageKey) || '[]');
        posts.unshift({ title, category, content, media, type, date: new Date().toLocaleString(), views: 0 });
        localStorage.setItem(storageKey, JSON.stringify(posts));
        alert("Сақланди!");
        location.reload();
    }

    function renderAdmin() {
        let posts = JSON.parse(localStorage.getItem(storageKey) || '[]');
        const container = document.getElementById('adminList');
        posts.forEach((p, i) => {
            container.innerHTML += `
                <div class="post-item">
                    <div><b>${p.title}</b><br><small>${p.date}</small></div>
                    <button class="del-btn" onclick="deletePost(${i})">Ўчириш</button>
                </div>`;
        });
    }

    function deletePost(i) {
        let posts = JSON.parse(localStorage.getItem(storageKey) || '[]');
        posts.splice(i, 1);
        localStorage.setItem(storageKey, JSON.stringify(posts));
        location.reload();
    }

    renderAdmin();
</script>
</body>
</html>
