<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Админ Панел</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <style>
        body { background: #010409; color: #e6edf3; font-family: 'Segoe UI', sans-serif; }
        .panel-card { 
            background: #0d1117; 
            border: 1px solid #30363d; 
            border-radius: 15px; 
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        /* Муҳаррир дизайнини созлаш */
        .ql-toolbar { background: #161b22 !important; border-color: #30363d !important; border-radius: 8px 8px 0 0; }
        .ql-container { background: #010409 !important; border-color: #30363d !important; border-radius: 0 0 8px 8px; min-height: 150px; color: white; }
        .ql-stroke { stroke: #8b949e !important; }
        
        input { 
            background: #161b22 !important; 
            border: 1px solid #30363d !important; 
            color: white !important; 
            border-radius: 8px;
            padding: 8px;
            font-size: 13px;
        }

        .send-btn {
            background: #ffcc00; color: black; font-weight: bold;
            font-size: 11px; padding: 10px; border-radius: 8px;
            text-transform: uppercase; cursor: pointer; transition: 0.2s;
        }
        .send-btn:hover { background: #fff; }

        /* Расм танлаш тугмаси */
        .file-label {
            background: #21262d; border: 1px dashed #30363d;
            color: #8b949e; font-size: 10px; padding: 8px;
            text-align: center; border-radius: 8px; cursor: pointer;
        }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="max-w-[1600px] mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-xl font-bold uppercase italic">Universal <span class="text-yellow-500">Studio</span> Admin</h1>
            <div class="flex gap-4 text-[10px] font-bold">
                <a href="index.html" class="text-gray-500 hover:text-white">САЙТГА ҚАЙТИШ</a>
                <button onclick="logout()" class="text-red-500">ЧИҚИШ</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            
            <div class="panel-card border-t-4 border-blue-500">
                <span class="text-[10px] font-bold text-blue-500 uppercase"><i class="fas fa-newspaper"></i> Янгиликлар</span>
                <input type="text" id="t-news" placeholder="Сарлавҳа...">
                <div class="file-label" onclick="document.getElementById('f-news').click()">Расм танлаш (Ixtiyoriy)</div>
                <input type="file" id="f-news" class="hidden" accept="image/*">
                <div id="editor-news"></div>
                <button onclick="publish('Янгиликлар', 't-news', quillNews, 'f-news')" class="send-btn">Чоп этиш</button>
            </div>

            <div class="panel-card border-t-4 border-green-500">
                <span class="text-[10px] font-bold text-green-500 uppercase"><i class="fas fa-heartbeat"></i> Табобат</span>
                <input type="text" id="t-med" placeholder="Сарлавҳа...">
                <div class="file-label" onclick="document.getElementById('f-med').click()">Расм танлаш</div>
                <input type="file" id="f-med" class="hidden" accept="image/*">
                <div id="editor-med"></div>
                <button onclick="publish('Табобат', 't-med', quillMed, 'f-med')" class="send-btn">Чоп этиш</button>
            </div>

            <div class="panel-card border-t-4 border-purple-500">
                <span class="text-[10px] font-bold text-purple-500 uppercase"><i class="fas fa-book"></i> Ҳикоялар</span>
                <input type="text" id="t-story" placeholder="Сарлавҳа...">
                <div class="file-label" onclick="document.getElementById('f-story').click()">Расм танлаш</div>
                <input type="file" id="f-story" class="hidden" accept="image/*">
                <div id="editor-story"></div>
                <button onclick="publish('Ҳикоялар', 't-story', quillStory, 'f-story')" class="send-btn">Чоп этиш</button>
            </div>

            <div class="panel-card border-t-4 border-yellow-500">
                <span class="text-[10px] font-bold text-yellow-500 uppercase"><i class="fas fa-feather"></i> Шеърият</span>
                <input type="text" id="t-poem" placeholder="Сарлавҳа...">
                <div class="file-label" onclick="document.getElementById('f-poem').click()">Расм танлаш</div>
                <input type="file" id="f-poem" class="hidden" accept="image/*">
                <div id="editor-poem"></div>
                <button onclick="publish('Шеърият', 't-poem', quillPoem, 'f-poem')" class="send-btn">Чоп этиш</button>
            </div>

        </div>
    </div>

    <script>
        // Муҳаррир созламалари
        const toolbarOptions = [
            ['bold', 'italic', 'underline'],
            [{ 'color': [] }, { 'size': ['small', false, 'large', 'huge'] }],
            ['link', 'image']
        ];

        const quillNews = new Quill('#editor-news', { modules: { toolbar: toolbarOptions }, theme: 'snow' });
        const quillMed = new Quill('#editor-med', { modules: { toolbar: toolbarOptions }, theme: 'snow' });
        const quillStory = new Quill('#editor-story', { modules: { toolbar: toolbarOptions }, theme: 'snow' });
        const quillPoem = new Quill('#editor-poem', { modules: { toolbar: toolbarOptions }, theme: 'snow' });

        async function publish(category, tId, quillObj, fId) {
            const title = document.getElementById(tId).value;
            const content = quillObj.root.innerHTML;
            const fileInput = document.getElementById(fId);
            let imageData = "";

            if (!title || quillObj.getText().trim().length === 0) {
                alert("Маълумотларни тўлиқ киритинг!");
                return;
            }

            // Расмни Base64 га айлантириш
            if (fileInput.files[0]) {
                const reader = new FileReader();
                imageData = await new Promise(resolve => {
                    reader.onload = e => resolve(e.target.result);
                    reader.readAsDataURL(fileInput.files[0]);
                });
            }

            const posts = JSON.parse(localStorage.getItem('my_site_posts') || '[]');
            posts.push({
                id: Date.now(),
                title: title,
                content: content,
                image: imageData,
                category: category,
                date: new Date().toLocaleString()
            });

            localStorage.setItem('my_site_posts', JSON.stringify(posts));
            alert(category + " бўлимига юборилди!");
            
            // Тозалаш
            document.getElementById(tId).value = "";
            quillObj.setContents([]);
        }

        function logout() {
            localStorage.removeItem('admin_auth');
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
