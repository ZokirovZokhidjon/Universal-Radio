<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Zokirov Creative - Admin Panel</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; --danger: #ef4444; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #0f172a; color: white; border: 1px solid #334155; border-radius: 8px; }
        #editor { height: 250px; background: white; color: black; border-radius: 0 0 8px 8px; }
        .ql-toolbar { background: #f1f5f9; border-radius: 8px 8px 0 0; }
        .btn { width: 100%; padding: 15px; background: var(--accent); color: #0f172a; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        .btn:hover { opacity: 0.9; }
        .post-item { background: var(--card); padding: 15px; margin-top: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--accent); }
        .del-btn { background: var(--danger); color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
        .container a { color: gold; text-decoration: none; font-weight: bold; margin-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
        <h1>Админ Панель</h1>
        <div>
            <a href="news.html">Сайтга қайтиш</a>
            <a href="index.html" onclick="localStorage.removeItem('admin_auth')">Чиқиш (Exit)</a>
        </div>
    </div>

    <div class="card">
        <label>Сарлавҳа:</label>
        <input type="text" id="title" placeholder="Мақола номини ёзинг...">
        
        <label>Бўлимни танланг:</label>
        <select id="category">
            <option value="Янгиликлар">Янгиликлар</option>
            <option value="Табобат">Табобат</option>
            <option value="Балиқ ови">Балиқ ови</option>
            <option value="Ҳикоялар">Ҳикоялар</option>
            <option value="Шеърият">Шеърият</option>
        </select>

        <label>Расм ёки Файл (ихтиёрий):</label>
        <input type="file" id="mediaFile" accept="image/*, audio/mp3">

        <label>Матн қисми:</label>
        <div id="editor"></div>

        <button class="btn" onclick="savePost()">САЙТГА ЖОЙЛАШ</button>
    </div>

    <h3>Юкланган мақолалар рўйхати</h3>
    <div id="adminList"></div>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script>
    // Хавфсизлик текшируви: агар логин қилмаган бўлса, орқага қайтаради
    if (localStorage.getItem('admin_auth') !== 'true') {
        window.location.href = 'index.html';
    }

    // Quill муҳарририни кенгайтирилган созламалар билан ишга тушириш
var quill = new Quill('#editor', {
    theme: 'snow',
    placeholder: 'Мақола матнини шу ерга ёзинг...',
    modules: {
        toolbar: [
            [{ 'header': [1, 2, 3, false] }], // Сарлавҳалар
            [{ 'size': ['small', false, 'large', 'huge'] }], // Шрифт ҳажми
            ['bold', 'italic', 'underline', 'strike'], // Матн услуби
            [{ 'color': [] }, { 'background': [] }], // МАТН РАНГИ ВА ОРҚА ФОН РАНГИ
            [{ 'align': [] }], // Матнни текислаш
            ['link', 'image', 'video'], // Линк ва медиа
            ['clean'] // Форматни тозалаш
        ]
    }
});

    const storageKey = 'my_site_posts';

    function savePost() {
        const title = document.getElementById('title').value;
        const category = document.getElementById('category').value;
        const content = quill.root.innerHTML;
        const fileInput = document.getElementById('mediaFile');
        const file = fileInput.files[0];

        if(!title || quill.getText().trim() === "") {
            return alert("Илтимос, ҳамма майдонларни тўлдиринг!");
        }

        if(file) {
            const reader = new FileReader();
            reader.onload = (e) => finishSave(title, category, content, e.target.result, file.type);
            reader.readAsDataURL(file);
        } else {
            finishSave(title, category, content, null, null);
        }
    }

    function finishSave(title, category, content, media, type) {
        try {
            let posts = JSON.parse(localStorage.getItem(storageKey) || '[]');
            posts.unshift({ 
                title, 
                category, 
                content, 
                media, 
                type, 
                date: new Date().toLocaleString(),
                id: Date.now() 
            });
            localStorage.setItem(storageKey, JSON.stringify(posts));
            alert("Муваффақиятли жойланди!");
            location.reload();
        } catch (e) {
            alert("Хатолик: Хотира тўлиб қолган бўлиши мумкин (Расм ҳажми жуда катта).");
        }
    }

    function renderAdmin() {
        let posts = JSON.parse(localStorage.getItem(storageKey) || '[]');
        const container = document.getElementById('adminList');
        container.innerHTML = posts.length === 0 ? "<p>Ҳозирча мақолалар йўқ.</p>" : "";

        posts.forEach((p, i) => {
            container.innerHTML += `
                <div class="post-item">
                    <div>
                        <span style="color:var(--accent)">[${p.category}]</span> 
                        <strong>${p.title}</strong><br>
                        <small style="color:#94a3b8">${p.date}</small>
                    </div>
                    <button class="del-btn" onclick="deletePost(${i})">Ўчириш</button>
                </div>`;
        });
    }

    function deletePost(i) {
        if(confirm("Бу мақолани ўчириб ташлаймизми?")) {
            let posts = JSON.parse(localStorage.getItem(storageKey) || '[]');
            posts.splice(i, 1);
            localStorage.setItem(storageKey, JSON.stringify(posts));
            renderAdmin();
        }
    }

    renderAdmin();
</script>

</body>
</html>
