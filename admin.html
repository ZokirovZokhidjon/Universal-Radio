<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Universal Control Panel v11.0</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: Arial, sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 1100px; margin: 0 auto; display: flex; gap: 20px; }
        .main { flex: 3; background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid var(--border); }
        .sidebar { flex: 1; }
        
        input, select, textarea { width: 100%; background: #0d1117; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 6px; margin-bottom: 10px; box-sizing: border-box; }
        textarea { min-height: 300px; font-family: monospace; font-size: 14px; }
        
        .toolbar { background: #21262d; padding: 10px; border-radius: 6px; margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 5px; }
        .toolbar button { background: #30363d; color: white; border: 1px solid var(--border); padding: 5px 10px; cursor: pointer; border-radius: 4px; }
        .toolbar button:hover { background: #484f58; }
        
        .btn-save { background: #238636; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        
        .post-item { background: #0d1117; border: 1px solid var(--border); padding: 10px; margin-top: 10px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        .btn-del { background: #da3633; border: none; color: white; padding: 5px; border-radius: 4px; cursor: pointer; }
        .btn-edit { background: #1f6feb; border: none; color: white; padding: 5px; border-radius: 4px; cursor: pointer; margin-right: 5px; }
        
        .box { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        #preview { background: white; color: black; padding: 15px; border-radius: 6px; margin-top: 10px; min-height: 100px; overflow-wrap: break-word; }
        img { max-width: 100px; height: auto; }
    </style>
</head>
<body>

<div class="container">
    <div class="main">
        <h2>✍️ Мақола қўшиш</h2>
        <input type="text" id="title" placeholder="Сарлавҳа...">
        <select id="cat">
            <option value="news">Янгиликлар</option>
            <option value="med">Табобат</option>
             <option value="baliq-ovi" >Балик ови</option>
            <option value="hikoyalar">Хикоялар</option>
            <option value="creative">Ижод</option>
            <option value="poetic">Шеърият</option>
        </select>

        <div class="toolbar">
            <button onclick="addTag('b')"><b>B</b></button>
            <button onclick="addTag('i')"><i>I</i></button>
            <button onclick="addTag('u')"><u>U</u></button>
            <button onclick="addTag('center')">Center</button>
            <button onclick="document.getElementById('imgInp').click()">🖼 Расм</button>
            <input type="file" id="imgInp" hidden accept="image/*" onchange="uploadImg()">
        </div>

        <textarea id="text" oninput="updatePreview()" placeholder="Матнни шу ерга ёзинг..."></textarea>
        
        <div style="color: gray; font-size: 12px;">Кўриниши (Preview):</div>
        <div id="preview"></div>

        <button class="btn-save" onclick="savePost()">САЙТГА ЖОЙЛАШ</button>

        <h3 style="margin-top: 30px;">📁 Мақолалар:</h3>
        <div id="postList"></div>
    </div>

    <div class="sidebar">
        <div class="box">
            <h3>🎵 MP3 Плеер</h3>
            <input type="file" id="mp3" accept="audio/*" onchange="document.getElementById('aud').src=URL.createObjectURL(this.files[0])">
            <audio id="aud" controls style="width: 100%;"></audio>
        </div>
        <div class="box">
            <h3>📊 Статистика</h3>
            <img src="https://s11.flagcounter.com/count2/8uM1/bg_161B22/txt_FFFFFF/border_30363D/columns_1/maxflags_1/viewers_3/labels_1/pageviews_1/flags_0/percent_0/" alt="counter">
        </div>
    </div>
</div>

<script>
    let posts = JSON.parse(localStorage.getItem('myPosts') || '[]');
    let editIdx = -1;

    function addTag(tag) {
        const area = document.getElementById('text');
        const start = area.selectionStart;
        const end = area.selectionEnd;
        const sel = area.value.substring(start, end);
        const text = area.value.substring(0, start) + `<${tag}>` + sel + `</${tag}>` + area.value.substring(end);
        area.value = text;
        updatePreview();
    }

    function uploadImg() {
        const file = document.getElementById('imgInp').files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            const area = document.getElementById('text');
            area.value += `<img src="${e.target.result}" style="width:100%">`;
            updatePreview();
        };
        reader.readAsDataURL(file);
    }

    function updatePreview() {
        document.getElementById('preview').innerHTML = document.getElementById('text').value;
    }

    function savePost() {
        const t = document.getElementById('title').value;
        const txt = document.getElementById('text').value;
        const c = document.getElementById('cat').value;

        if(!t || !txt) return alert("Тўлдиринг!");

        const newPost = { title: t, content: txt, cat: c, date: new Date().toLocaleString() };

        if(editIdx > -1) {
            posts[editIdx] = newPost;
            editIdx = -1;
        } else {
            posts.unshift(newPost);
        }

        localStorage.setItem('myPosts', JSON.stringify(posts));
        reset();
        showPosts();
        alert("Сақланди!");
    }

    function showPosts() {
        const list = document.getElementById('postList');
        list.innerHTML = '';
        posts.forEach((p, i) => {
            list.innerHTML += `
                <div class="post-item">
                    <span>${p.title} <br><small>${p.date}</small></span>
                    <div>
                        <button class="btn-edit" onclick="edit(${i})">✏️</button>
                        <button class="btn-del" onclick="del(${i})">🗑</button>
                    </div>
                </div>`;
        });
    }

    function edit(i) {
        const p = posts[i];
        document.getElementById('title').value = p.title;
        document.getElementById('text').value = p.content;
        document.getElementById('cat').value = p.cat;
        editIdx = i;
        updatePreview();
        window.scrollTo(0,0);
    }

    function del(i) {
        if(confirm("Ўчирилсинми?")) {
            posts.splice(i, 1);
            localStorage.setItem('myPosts', JSON.stringify(posts));
            showPosts();
        }
    }

    function reset() {
        document.getElementById('title').value = '';
        document.getElementById('text').value = '';
        document.getElementById('preview').innerHTML = '';
    }

    showPosts();
</script>

</body>
</html>
