<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Админ Бошқаруви</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <style>
        body { background: #010409; color: #e6edf3; font-family: 'Segoe UI', sans-serif; }
        .panel-card { background: #0d1117; border: 1px solid #30363d; border-radius: 15px; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .ql-toolbar { background: #161b22 !important; border-color: #30363d !important; border-radius: 8px 8px 0 0; }
        .ql-container { background: #010409 !important; border-color: #30363d !important; border-radius: 0 0 8px 8px; min-height: 150px; color: white; }
        input { background: #161b22 !important; border: 1px solid #30363d !important; color: white !important; border-radius: 8px; padding: 8px; font-size: 13px; }
        .send-btn { background: #ffcc00; color: black; font-weight: bold; font-size: 11px; padding: 10px; border-radius: 8px; text-transform: uppercase; cursor: pointer; }
        .file-label { background: #21262d; border: 1px dashed #30363d; color: #8b949e; font-size: 10px; padding: 8px; text-align: center; border-radius: 8px; cursor: pointer; }
        
        /* Жадвал учун стиллар */
        .admin-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .admin-table th { background: #161b22; color: #8b949e; text-align: left; padding: 12px; border-bottom: 2px solid #30363d; }
        .admin-table td { padding: 12px; border-bottom: 1px solid #30363d; }
        .category-badge { padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 10px; }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="max-w-[1600px] mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-xl font-bold uppercase italic">Universal <span class="text-yellow-500">Studio</span> Admin</h1>
            <div class="flex gap-4 text-[10px] font-bold">
                <a href="index.html" class="text-gray-500 hover:text-white uppercase">Сайтга қайтиш</a>
                <button onclick="logout()" class="text-red-500 uppercase">Чиқиш</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-12">
            <div class="panel-card border-t-4 border-blue-500">
                <span class="text-[10px] font-bold text-blue-500 uppercase">Янгиликлар</span>
                <input type="text" id="t-news" placeholder="Сарлавҳа...">
                <div class="file-label" onclick="document.getElementById('f-news').click()">Расм танлаш</div>
                <input type="file" id="f-news" class="hidden" accept="image/*">
                <div id="editor-news"></div>
                <button onclick="publish('Янгиликлар', 't-news', quillNews, 'f-news')" class="send-btn">Юбориш</button>
            </div>

            <div class="panel-card border-t-4 border-green-500">
                <span class="text-[10px] font-bold text-green-500 uppercase">Табобат</span>
                <input type="text" id="t-med" placeholder="Сарлавҳа...">
                <div class="file-label" onclick="document.getElementById('f-med').click()">Расм танлаш</div>
                <input type="file" id="f-med" class="hidden" accept="image/*">
                <div id="editor-med"></div>
                <button onclick="publish('Табобат', 't-med', quillMed, 'f-med')" class="send-btn">Юбориш</button>
            </div>

            <div class="panel-card border-t-4 border-purple-500">
                <span class="text-[10px] font-bold text-purple-500 uppercase">Ҳикоялар</span>
                <input type="text" id="t-story" placeholder="Сарлавҳа...">
                <div class="file-label" onclick="document.getElementById('f-story').click()">Расм танлаш</div>
                <input type="file" id="f-story" class="hidden" accept="image/*">
                <div id="editor-story"></div>
                <button onclick="publish('Ҳикоялар', 't-story', quillStory, 'f-story')" class="send-btn">Юбориш</button>
            </div>

            <div class="panel-card border-t-4 border-yellow-500">
                <span class="text-[10px] font-bold text-yellow-500 uppercase">Шеърият</span>
                <input type="text" id="t-poem" placeholder="Сарлавҳа...">
                <div class="file-label" onclick="document.getElementById('f-poem').click()">Расм танлаш</div>
                <input type="file" id="f-poem" class="hidden" accept="image/*">
                <div id="editor-poem"></div>
                <button onclick="publish('Шеърият', 't-poem', quillPoem, 'f-poem')" class="send-btn">Юбориш</button>
            </div>
        </div>

        <div class="bg-[#0d1117] border border-[#30363d] rounded-xl overflow-hidden">
            <div class="p-4 border-b border-[#30363d] flex justify-between items-center">
                <h2 class="text-sm font-bold uppercase tracking-widest text-gray-400">Юборилган мақолалар таҳрири</h2>
                <span id="post-count" class="text-[10px] bg-yellow-500/10 text-yellow-500 px-3 py-1 rounded-full">Жами: 0</span>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-12">
    
    <div class="panel-card lg:col-span-1 flex items-center justify-center">
        <div style="width: 250px; height: 250px;">
            <canvas id="statsChart"></canvas>
        </div>
    </div>

    <div class="panel-card lg:col-span-2 grid grid-cols-2 md:grid-cols-4 gap-4 bg-transparent border-none p-0">
        <div class="panel-card items-center justify-center border-t-4 border-blue-500">
            <span class="text-[10px] text-gray-500 uppercase font-bold">Янгиликлар</span>
            <h2 id="count-news" class="text-2xl font-black">0</h2>
        </div>
        <div class="panel-card items-center justify-center border-t-4 border-green-500">
            <span class="text-[10px] text-gray-500 uppercase font-bold">Табобат</span>
            <h2 id="count-med" class="text-2xl font-black">0</h2>
        </div>
        <div class="panel-card items-center justify-center border-t-4 border-purple-500">
            <span class="text-[10px] text-gray-500 uppercase font-bold">Ҳикоялар</span>
            <h2 id="count-story" class="text-2xl font-black">0</h2>
        </div>
        <div class="panel-card items-center justify-center border-t-4 border-yellow-500">
            <span class="text-[10px] text-gray-500 uppercase font-bold">Шеърият</span>
            <h2 id="count-poem" class="text-2xl font-black">0</h2>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    // Статистикани ҳисоблаш ва тортни чизиш функцияси
    function updateStatistics() {
        const posts = JSON.parse(localStorage.getItem('my_site_posts') || '[]');
        
        const stats = {
            news: posts.filter(p => p.category === 'Янгиликлар').length,
            med: posts.filter(p => p.category === 'Табобат').length,
            story: posts.filter(p => p.category === 'Ҳикоялар').length,
            poem: posts.filter(p => p.category === 'Шеърият').length
        };

        // Рақамларни янгилаш
        document.getElementById('count-news').innerText = stats.news;
        document.getElementById('count-med').innerText = stats.med;
        document.getElementById('count-story').innerText = stats.story;
        document.getElementById('count-poem').innerText = stats.poem;

        // Торт (Chart) чизиш
        const ctx = document.getElementById('statsChart').getContext('2d');
        
        // Агар олдин график чизилган бўлса, уни ўчириб қайта чизамиз
        if (window.myChart) window.myChart.destroy();

        window.myChart = new Chart(ctx, {
            type: 'doughnut', // 'pie' қилсангиз тўлиқ торт бўлади, 'doughnut' ўртаси очиқ торт
            data: {
                labels: ['Янгиликлар', 'Табобат', 'Ҳикоялар', 'Шеърият'],
                datasets: [{
                    data: [stats.news, stats.med, stats.story, stats.poem],
                    backgroundColor: ['#3b82f6', '#10b981', '#a855f7', '#f59e0b'],
                    borderColor: '#0d1117',
                    borderWidth: 2
                }]
            },
            options: {
                plugins: {
                    legend: { display: false } // Ранглар тагидаги ёзувни яшириб турамиз (кардларда борлиги учун)
                },
                cutout: '70%' // Ўртасини кенгайтириш
            }
        });
    }

    // Бу функцияни loadAdminList() ичида чақириб қўйинг
    // window.onload = function() { loadAdminList(); updateStatistics(); }
</script>
            <div class="overflow-x-auto">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Сана</th>
                            <th>Рукн</th>
                            <th>Сарлавҳа</th>
                            <th class="text-right">Амаллар</th>
                        </tr>
                    </thead>
                    <tbody id="posts-list-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const toolbarOptions = [['bold', 'italic', 'underline'], [{ 'color': [] }, { 'size': ['small', false, 'large', 'huge'] }], ['link', 'image']];
        const quillNews = new Quill('#editor-news', { modules: { toolbar: toolbarOptions }, theme: 'snow' });
        const quillMed = new Quill('#editor-med', { modules: { toolbar: toolbarOptions }, theme: 'snow' });
        const quillStory = new Quill('#editor-story', { modules: { toolbar: toolbarOptions }, theme: 'snow' });
        const quillPoem = new Quill('#editor-poem', { modules: { toolbar: toolbarOptions }, theme: 'snow' });

        // МАҚОЛАНИ ЮБОРИШ
        async function publish(category, tId, quillObj, fId) {
            const title = document.getElementById(tId).value;
            const content = quillObj.root.innerHTML;
            const fileInput = document.getElementById(fId);
            let imageData = "";

            if (!title || quillObj.getText().trim().length === 0) {
                alert("Маълумотларни тўлиқ киритинг!"); return;
            }

            if (fileInput.files[0]) {
                const reader = new FileReader();
                imageData = await new Promise(resolve => {
                    reader.onload = e => resolve(e.target.result);
                    reader.readAsDataURL(fileInput.files[0]);
                });
            }

            const posts = JSON.parse(localStorage.getItem('my_site_posts') || '[]');
            posts.push({
                id: Date.now(),
                title: title,
                content: content,
                image: imageData,
                category: category,
                date: new Date().toLocaleDateString()
            });

            localStorage.setItem('my_site_posts', JSON.stringify(posts));
            document.getElementById(tId).value = "";
            quillObj.setContents([]);
            loadAdminList();
            alert("Мақола юборилди!");
        }

        // РЎЙХАТНИ ЮКЛАШ (Ўчириш ва таҳрирлаш тугмалари билан)
        function loadAdminList() {
            const posts = JSON.parse(localStorage.getItem('my_site_posts') || '[]');
            const listBody = document.getElementById('posts-list-body');
            const countLabel = document.getElementById('post-count');
            
            countLabel.innerText = `Жами: ${posts.length}`;
            
            listBody.innerHTML = posts.reverse().map(p => `
                <tr class="hover:bg-white/5 transition">
                    <td class="text-gray-500">${p.date}</td>
                    <td><span class="category-badge border border-gray-700">${p.category}</span></td>
                    <td class="font-bold">${p.title}</td>
                    <td class="text-right">
                        <button onclick="editPost(${p.id})" class="text-blue-500 hover:underline mr-4"><i class="fas fa-edit"></i> Таҳрир</button>
                        <button onclick="deletePost(${p.id})" class="text-red-500 hover:underline"><i class="fas fa-trash"></i> Ўчириш</button>
                    </td>
                </tr>
            `).join('');
        }

        // ЎЧИРИШ
        function deletePost(id) {
            if(confirm("Бу мақолани бутунлай ўчириб юбормоқчимисиз?")) {
                let posts = JSON.parse(localStorage.getItem('my_site_posts') || '[]');
                posts = posts.filter(p => p.id !== id);
                localStorage.setItem('my_site_posts', JSON.stringify(posts));
                loadAdminList();
            }
        }

        // ТАҲРИРЛАШ (Мақолани қайтадан панелга чиқаради)
        function editPost(id) {
            const posts = JSON.parse(localStorage.getItem('my_site_posts') || '[]');
            const post = posts.find(p => p.id === id);
            
            if(!post) return;

            // Категорияга қараб керакли панелни топиш ва маълумотни тўлдириш
            let quill;
            if(post.category === 'Янгиликлар') { document.getElementById('t-news').value = post.title; quillNews.root.innerHTML = post.content; window.scrollTo(0,0); }
            else if(post.category === 'Табобат') { document.getElementById('t-med').value = post.title; quillMed.root.innerHTML = post.content; window.scrollTo(0,0); }
            else if(post.category === 'Ҳикоялар') { document.getElementById('t-story').value = post.title; quillStory.root.innerHTML = post.content; window.scrollTo(0,0); }
            else if(post.category === 'Шеърият') { document.getElementById('t-poem').value = post.title; quillPoem.root.innerHTML = post.content; window.scrollTo(0,0); }
            
            // Эскисини ўчириб юбориб, янгиси сифатида сақлашга тайёрлаймиз
            if(confirm("Мақола таҳрирлаш учун панелга чиқарилди. Янгилаб бўлгач, қайтадан 'Юбориш' тугмасини босасиз. Эски мақолани ўчирайми?")) {
                deletePost(id);
            }
        }

        function logout() { localStorage.removeItem('admin_auth'); window.location.href = "index.html"; }
        window.onload = loadAdminList;
    </script>
</body>
</html>
