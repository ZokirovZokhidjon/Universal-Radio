<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Universal Pro Admin - Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <style>
        body { background: #010409; font-family: 'Inter', sans-serif; color: white; }
        .ql-container { height: 400px; background: white; color: black; border-radius: 0 0 12px 12px; font-size: 16px; }
        .ql-toolbar { background: #f0f0f0; border-radius: 12px 12px 0 0; border: none !important; }
        .admin-card { background: #0d1117; border: 1px solid #30363d; border-radius: 20px; padding: 24px; }
        select { color: black !important; font-weight: bold; }
        /* Видео контейнери учун */
        .ql-video { width: 100%; height: 300px; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
            <h1 class="text-2xl font-black text-yellow-500 italic">UNIVERSAL ADMIN <span class="text-white text-[10px] block not-italic font-normal">PROFESSIONAL CONTROL PANEL</span></h1>
            <button onclick="logout()" class="text-xs bg-red-600 px-4 py-2 rounded-full font-bold hover:bg-red-700 transition-all">ЧИҚИШ</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="admin-card space-y-4 shadow-2xl">
                <h2 id="formTitle" class="text-yellow-500 font-bold uppercase text-xs mb-4 border-l-4 border-yellow-500 pl-2">Мақола қўшиш ва таҳрирлаш</h2>
                
                <input type="text" id="postTitle" placeholder="Сарлавҳани киритинг..." class="w-full bg-black border border-gray-700 p-3 rounded-xl outline-none focus:border-yellow-600 text-lg font-bold text-white">
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Асосий расм</label>
                        <input type="file" id="postFile" accept="image/*" onchange="encodeFile('image')" class="text-xs text-gray-400 w-full">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Рукнни танланг</label>
                        <select id="postCategory" class="w-full bg-white border border-gray-700 p-2 rounded-lg outline-none text-black text-sm">
                            <option>Янгиликлар</option>
                            <option>Табобат</option>
                            <option>Шеърият</option>
                            <option>Кулинария</option>
                            <option>Балиқ ови</option>
                            <option>Ҳикоялар</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Манба (Ссылка)</label>
                    <input type="text" id="postSource" placeholder="https://example.com ёки манба номи" class="w-full bg-black border border-gray-700 p-3 rounded-xl outline-none text-blue-400 text-xs">
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Мақола матни (Видео/Ранг/Ҳажм шу ерда)</label>
                    <div id="editor"></div>
                </div>
                
                <div class="flex gap-2">
                    <button id="mainBtn" onclick="savePost()" class="flex-1 bg-yellow-600 hover:bg-yellow-500 text-black font-black py-4 rounded-xl transition-all uppercase shadow-lg">Сайтга жойлаш</button>
                    <button id="cancelBtn" onclick="resetForm()" class="hidden bg-gray-800 text-white px-6 py-4 rounded-xl text-xs font-bold uppercase transition-all">Бекор қилиш</button>
                </div>
            </div>

            <div class="admin-card">
                <h2 class="text-white font-bold uppercase text-xs mb-6 border-l-4 border-yellow-500 pl-3 italic">Барча мақолалар архиви</h2>
                <div id="archiveList" class="space-y-3 max-h-[850px] overflow-y-auto pr-2">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // Quill Муҳаррири (Тўлиқ функциялар билан)
        var quill = new Quill('#editor', {
            theme: 'snow',
            placeholder: 'Бу ерга матн ёзинг, ранг беринг ёки YouTube ҳаволасини қўшинг...',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, 4, false] }], // Матн катта-кичиклиги
                    ['bold', 'italic', 'underline', 'strike'], 
                    [{ 'color': [] }, { 'background': [] }], // МАТН РАНГИ ВА ОРҚА ФОНИ
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }], 
                    [{ 'align': [] }], 
                    ['link', 'image', 'video'], // IFRAME ВИДЕО ШУ ЕРДА
                    ['clean']
                ]
            }
        });

        let mediaData = { image: "" };
        let editIndex = null;

        function encodeFile(type) {
            const input = document.getElementById('postFile');
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onloadend = () => { mediaData.image = reader.result; };
                reader.readAsDataURL(file);
            }
        }

        function savePost() {
            const title = document.getElementById('postTitle').value;
            const category = document.getElementById('postCategory').value;
            const source = document.getElementById('postSource').value;
            const content = quill.root.innerHTML;
            
            if(!title || content === "<p><br></p>") {
                alert("Илтимос, сарлавҳа ва мақола матнини киритинг!");
                return;
            }

            let posts = JSON.parse(localStorage.getItem('my_site_posts') || '[]');

            const postObj = { 
                title, category, source, content, 
                image: mediaData.image, 
                date: editIndex !== null ? posts[editIndex].date : new Date().toLocaleDateString() 
            };

            if (editIndex !== null) {
                posts[editIndex] = postObj;
                editIndex = null;
            } else {
                posts.push(postObj);
            }

            localStorage.setItem('my_site_posts', JSON.stringify(posts));
            resetForm();
            displayArchive();
            alert("Мақола муваффақиятли сақланди!");
        }

        function displayArchive() {
            const posts = JSON.parse(localStorage.getItem('my_site_posts') || '[]');
            const list = document.getElementById('archiveList');
            
            list.innerHTML = posts.map((p, i) => ({...p, originalIndex: i}))
                .reverse()
                .map(p => `
                    <div class="bg-black/50 border border-gray-800 p-4 rounded-xl flex justify-between items-center hover:border-yellow-600 transition-all group">
                        <div class="truncate mr-4">
                            <p class="text-[9px] text-yellow-600 font-bold uppercase tracking-tighter">${p.category}</p>
                            <h3 class="text-sm font-bold truncate text-gray-200">${p.title}</h3>
                        </div>
                        <div class="flex gap-4">
                            <button onclick="editPost(${p.originalIndex})" class="text-blue-400 text-[10px] font-bold uppercase hover:text-blue-300">Таҳрир</button>
                            <button onclick="deletePost(${p.originalIndex})" class="text-red-500 text-[10px] font-bold uppercase hover:text-red-400">Ўчириш</button>
                        </div>
                    </div>
                `).join('');
        }

        function editPost(i) {
            const posts = JSON.parse(localStorage.getItem('my_site_posts') || '[]');
            const p = posts[i];
            
            document.getElementById('postTitle').value = p.title;
            document.getElementById('postCategory').value = p.category;
            document.getElementById('postSource').value = p.source;
            quill.root.innerHTML = p.content;
            mediaData.image = p.image;
            
            editIndex = i;
            document.getElementById('formTitle').innerText = "Мақолани ўзгартириш";
            document.getElementById('mainBtn').innerText = "Сақлаш";
            document.getElementById('cancelBtn').classList.remove('hidden');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function resetForm() {
            document.getElementById('postTitle').value = "";
            document.getElementById('postSource').value = "";
            document.getElementById('postFile').value = "";
            quill.root.innerHTML = "";
            mediaData = { image: "" };
            editIndex = null;
            document.getElementById('formTitle').innerText = "Янги мақола яратиш";
            document.getElementById('mainBtn').innerText = "Сайтга жойлаш";
            document.getElementById('cancelBtn').classList.add('hidden');
        }

        function deletePost(i) {
            if(confirm("Бу мақолани ўчириб ташлаймизми?")) {
                let posts = JSON.parse(localStorage.getItem('my_site_posts') || '[]');
                posts.splice(i, 1);
                localStorage.setItem('my_site_posts', JSON.stringify(posts));
                displayArchive();
            }
        }

        function logout() { window.location.href = "index.html"; }
        window.onload = displayArchive;
    </script>
</body>
</html>
