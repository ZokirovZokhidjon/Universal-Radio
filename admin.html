<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIVERSAL ADMIN V6.0</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --blue: #238636; --text: #c9d1d9; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .card { background: var(--card); border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
        h2 { margin-top: 0; font-size: 18px; color: #58a6ff; }
        
        /* Муҳаррир (Editor) созламалари */
        #editor-container { height: 400px; background: white; color: black; border-radius: 0 0 8px 8px; }
        .ql-toolbar { background: #f0f0f0; border-radius: 8px 8px 0 0; }
        input, select { width: 100%; padding: 10px; margin-bottom: 15px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-post { background: #238636; color: white; margin-top: 15px; }
        .btn-post:hover { background: #2ea043; }
        
        /* Плеер блоки */
        .player-box { text-align: center; }
        audio { width: 100%; margin-top: 10px; }
        .file-label { display: block; background: #21262d; padding: 10px; border: 1px dashed #58a6ff; cursor: pointer; margin-bottom: 10px; }
        
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h1>UNIVERSAL ADMIN <span style="color: #58a6ff;">V6.0</span></h1>
    <button class="btn" style="width: auto; background: #da3633; color: white;">ЧИҚИШ</button>
</div>

<div class="container">
    <div class="card">
        <h2>📝 МАҚОЛА ЯРАТИШ (WORD ВА РАНГЛАР БИЛАН)</h2>
        <input type="text" id="post-title" placeholder="Мақола сарлавҳаси...">
       <select id="post-category">
            <option value="news">Янгиликлар</option>
            <option value="med">Табобат</option>
             <option value="baliq-ovi" >Балик ови</option>
            <option value="hikoyalar">Хикоялар</option>
            <option value="creative">Ижод</option>
            <option value="poetic">Шеърият</option>
        </select>
        
        <div id="editor-container"></div>
        
        <button class="btn btn-post" onclick="savePost()">САЙТГА ЧИҚАРИШ</button>
    </div>

    <div class="card">
        <div class="player-box">
            <h2>📻 РАДИО ЭФИР / ПЛЕЕР</h2>
            <p id="track-name" style="font-size: 12px; color: #8b949e;">Файл танланмаган</p>
            <label class="file-label">
                🎵 MP3 ФАЙЛ ЮКЛАШ
                <input type="file" id="audio-input" accept="audio/mp3" hidden onchange="handleAudio(this)">
            </label>
            <audio id="main-player" controls>
                Сизнинг браузерингиз аудио қўллаб-қувватламайди.
            </audio>
        </div>

        <hr style="border: 0.5px solid #30363d; margin: 20px 0;">

        <h2>📊 КИРУВЧИЛАР СТАТИСТИКАСИ</h2>
        <div style="background: #0d1117; padding: 10px; border-radius: 5px; text-align: center;">
            <a href="https://info.flagcounter.com/8uM1">
                <img src="https://s11.flagcounter.com/count2/8uM1/bg_0D1117/txt_FFFFFF/border_30363D/columns_1/maxflags_1/viewers_3/labels_1/pageviews_1/flags_0/percent_0/" alt="Flag Counter" border="0">
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script>
    // 1. Муҳаррирни созлаш (Ранглар ва Word формати учун)
    var quill = new Quill('#editor-container', {
        modules: {
            toolbar: [
                [{ 'header': [1, 2, 3, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                [{ 'color': [] }, { 'background': [] }], // Ранг танлаш
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                [{ 'align': [] }],
                ['link', 'image', 'clean'] // Тозалаш тугмаси Word форматини тўғрилайди
            ]
        },
        theme: 'snow',
        placeholder: 'Мақола матнини ёзинг ёки Wordдан кўчириб қўйинг...'
    });

    // 2. Плеер функцияси
    function handleAudio(input) {
        const file = input.files[0];
        const player = document.getElementById('main-player');
        const trackName = document.getElementById('track-name');
        
        if (file) {
            trackName.innerText = "Ижро этилмоқда: " + file.name;
            const url = URL.createObjectURL(file);
            player.src = url;
            player.play();
        }
    }

    // 3. Сақлаш функцияси (Консолга чиқаради)
    function savePost() {
        const title = document.getElementById('post-title').value;
        const content = quill.root.innerHTML; // HTML форматда олади (ранглари билан)
        
        if(!title || content === "<p><br></p>") {
            alert("Илтимос, сарлавҳа ва матнни тўлдиринг!");
            return;
        }

        console.log("Мақола сарлавҳаси:", title);
        console.log("Мақола матни (HTML):", content);
        alert("Мақола тайёр! Энди уни базага юбориш мумкин.");
    }
</script>

</body>
</html>
