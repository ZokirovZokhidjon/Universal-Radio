<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal News</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; }
        
        /* ЭНГ МУҲИМ ЖОЙИ: РАСМНИ 150PX ҚИЛИШ */
        #full-article-view img {
            width: 150px !important; 
            height: auto !important;
            border-radius: 10px;
            margin: 15px 0;
            display: block;
            border: 2px solid #ffcc00;
            transition: transform 0.3s;
        }

        /* РАСМНИ БОСГАНДА САЛГАНА КАТТАЛАШИШИ (180PX) */
        #full-article-view img:active {
            transform: scale(1.2);
        }

        .side-card { background: #111; border: 1px solid #333; padding: 10px; margin-bottom: 10px; cursor: pointer; border-radius: 10px; display: flex; gap: 10px; }
        .side-img { width: 60px; height: 60px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

    <header class="p-4 border-b border-yellow-600 flex justify-between items-center bg-black">
        <a href="index.html" class="bg-yellow-600 text-black px-4 py-2 rounded font-bold text-xs uppercase">Бош саҳифа</a>
        <h1 class="text-xl font-black text-yellow-500 italic">UNIVERSAL NEWS</h1>
    </header>

    <div class="max-w-6xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-8 bg-[#0d1117] p-6 rounded-2xl border border-gray-800">
            <div id="full-article-view"></div>
        </div>

        <div class="lg:col-span-4">
            <h3 class="text-yellow-500 font-bold text-xs mb-4 uppercase">Бошқа хабарлар</h3>
            <div id="side-list-view"></div>
        </div>
    </div>

    <script>
        // Маълумотларни олиш
        const rawData = localStorage.getItem('my_site_posts');
        const posts = rawData ? JSON.parse(rawData).reverse() : [];

        function showList() {
            const listDiv = document.getElementById('side-list-view');
            listDiv.innerHTML = posts.map((p, i) => `
                <div class="side-card" onclick="openPost(${i})">
                    <img src="${p.image || 'logo.jpg'}" class="side-img">
                    <div>
                        <h2 class="text-xs font-bold line-clamp-2">${p.title}</h2>
                        <p class="text-[8px] text-gray-500">${p.date}</p>
                    </div>
                </div>
            `).join('');
        }

        function openPost(index) {
            const p = posts[index];
            const contentDiv = document.getElementById('full-article-view');
            contentDiv.innerHTML = `
                <h1 class="text-2xl font-bold mb-2">${p.title}</h1>
                <p class="text-xs text-yellow-600 mb-4">${p.category} | ${p.date}</p>
                <div class="text-gray-300 leading-relaxed">${p.content}</div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = () => {
            showList();
            if (posts.length > 0) openPost(0);
        };
    </script>
</body>
</html>
