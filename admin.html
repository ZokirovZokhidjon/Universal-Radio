<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8" />
    <title>Zokirov Control Panel</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; }
        .admin-container { max-width: 900px; margin: 0 auto; background: #1e293b; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #38bdf8; text-align: center; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; color: #94a3b8; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; }
        textarea { height: 200px; resize: vertical; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-save { background: #0ea5e9; color: white; }
        .btn-save:hover { background: #0284c7; }
        .btn-clear { background: #64748b; color: white; }

        /* For the list */
        .post-list { margin-top: 40px; }
        .post-card { background: #334155; padding: 15px; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .post-info b { font-size: 18px; color: #38bdf8; }
        .post-info p { margin: 5px 0 0; font-size: 13px; color: #cbd5e1; }
        .actions button { padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; margin-left: 5px; font-weight: bold; }
        .edit { background: #fbbf24; color: #000; }
        .delete { background: #ef4444; color: white; }
    </style>
</head>
<body>
<div class="admin-container">
    <h1>Админ Кабинет</h1>

    <label>Мақола сарлавҳаси:</label>
    <input type="text" id="title" placeholder="Бу ерга сарлавҳа ёзинг...">

    <label>Бўлимни танланг:</label>
    <select id="category">
        <option value="news">Янгиликлар</option>
        <option value="med">Табобат</option>
        <option value="baliq-ovi">Балик ови</option>
        <option value="hikoyalar">Хикоялар</option>
        <option value="creative">Ижод</option>
        <option value="poetic">Шеърият</option>
    </select>

    <label>Расм қўшиш (Компьютердан):</label>
    <input type="file" id="fileInput" accept="image/*">

    <label>Мақола матни:</label>
   
    <textarea id="content" placeholder="Мақола матнини шу ерга ёзинг... HTML теглар ишлайди."></textarea>

    <div class="btn-group">
        <button class="btn btn-save" onclick="savePost()" id="mainBtn">САЙТГА ЖОЙЛАШ</button>
        <button class="btn btn-clear" onclick="clearAll()">ТОЗАЛАШ</button>
    </div>

    <div class="post-list">
        <h2>Сақланган мақолалар</h2>
        <div id="displayArea"></div>
    </div>
</div>

<script>
    let posts = JSON.parse(localStorage.getItem('zokirov_posts') || '[]');
    let currentId = -1;

    function savePost() {
        const title = document.getElementById('title').value;
        const content = document.getElementById('content').value;
        const category = document.getElementById('category').value;
        const file = document.getElementById('fileInput').files[0];

        if(!title || !content) {
            alert("Илтимос, сарлавҳа ва матнни тўлдиринг!");
            return;
        }

        if(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                processSave(title, content + `<br><img src="${e.target.result}" style="width:100%; border-radius:10px;">`, category);
            };
            reader.readAsDataURL(file);
        } else {
            processSave(title, content, category);
        }
    }

    function processSave(title, content, category) {
        const postData = { title, content, category, date: new Date().toLocaleString() };

        if(currentId > -1) {
            posts[currentId] = postData;
            currentId = -1;
            document.getElementById('mainBtn').innerText = "САЙТГА ЖОЙЛАШ";
        } else {
            posts.unshift(postData);
        }

        localStorage.setItem('zokirov_posts', JSON.stringify(posts));
        clearAll();
        renderPosts();
        alert("Муваффақиятли бажарилди!");
    }

    function renderPosts() {
        const area = document.getElementById('displayArea');
        area.innerHTML = posts.length === 0 ? '<p>Мақолалар мавжуд эмас.</p>' : '';

        posts.forEach((p, index) => {
            area.innerHTML += `
                <div class="
