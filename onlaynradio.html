
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Universal Studio Uzbekistan - Master Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <style>
        body { background: #010409; color: #e6edf3; font-family: sans-serif; }
        .daw-box { background: #0d1117; border: 1px solid #30363d; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.7); }
        .track-slot { background: #161b22; border-radius: 8px; border-left: 4px solid #1f6feb; }
        
        .fader-input {
            appearance: none; width: 140px; height: 6px; background: #21262d;
            border-radius: 3px; transform: rotate(-90deg); margin: 60px 0; outline: none; cursor: pointer;
        }
        .fader-input::-webkit-slider-thumb {
            appearance: none; width: 22px; height: 35px; background: #58a6ff;
            border-radius: 4px; border: 2px solid #fff;
        }
        .recording-on { animation: pulse 1s infinite; background: #f85149 !important; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center">

    <div class="mb-6 text-center">
        <img src="logo.jpg" alt="Logo" class="w-24 mx-auto mb-2">
        <h1 class="text-xl font-bold text-white uppercase tracking-widest">Universal Studio of Uzbekistan</h1>
        <p class="text-[10px] text-blue-400 font-bold tracking-[0.5em]">FIXED AUDIO ENGINE v7.0</p>
    </div>

    <div class="max-w-6xl w-full daw-box overflow-hidden border border-[#30363d]">
        
        <div class="p-4 bg-[#161b22] border-b border-[#30363d] flex items-center justify-between">
            <button id="recBtn" class="px-8 h-12 rounded-lg bg-red-900/20 border border-red-500/30 text-red-500 font-black flex items-center gap-2 hover:bg-red-600 hover:text-white transition-all">
                <i class="fas fa-circle"></i> RECORD
            </button>
            
            <div id="timer" class="font-mono text-4xl text-emerald-400 font-bold">00:00:00</div>
            
            <div class="flex gap-2">
                <label class="px-5 h-12 rounded-lg bg-blue-600 text-white text-xs font-bold flex items-center cursor-pointer hover:bg-blue-500 transition">
                    <i class="fas fa-upload mr-2"></i> MP3 ЮКЛАШ
                    <input type="file" id="audioInput" class="hidden" accept="audio/*">
                </label>
                <button id="saveBtn" disabled class="px-5 h-12 rounded-lg bg-emerald-600 text-white text-xs font-bold opacity-20 cursor-not-allowed">
                    <i class="fas fa-download mr-2"></i> САҚЛАШ
                </button>
            </div>
        </div>

        <div class="p-6 space-y-4 bg-[#010409]">
            <div class="track-slot p-6 flex items-center gap-10">
                <div class="flex flex-col items-center">
                    <span class="text-[10px] font-bold text-blue-400 mb-2">MUSIC</span>
                    <input type="range" id="mVol" class="fader-input" min="0" max="1" step="0.01" value="0.5">
                    <span id="mVolText" class="text-xs font-mono text-gray-500 mt-2">50%</span>
                </div>
                <div class="flex-1">
                    <div id="mWave" class="h-24 bg-black/40 rounded border border-white/5"></div>
                </div>
            </div>

            <div class="track-slot p-6 flex items-center gap-10 !border-emerald-500">
                <div class="flex flex-col items-center">
                    <span class="text-[10px] font-bold text-emerald-400 mb-2">MIC</span>
                    <input type="range" id="micVol" class="fader-input" min="0" max="1.5" step="0.01" value="0.8">
                    <span id="micVolText" class="text-xs font-mono text-gray-500 mt-2">80%</span>
                </div>
                <div class="flex-1 relative">
                    <canvas id="micViz" class="w-full h-24 bg-black/40 rounded border border-white/5"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        let audioCtx, musicBuffer, musicSource, mGain, micGain, rec, mixer;
        let chunks = [];
        let isRec = false;

        // WaveSurfer ни фақат визуал қилиб созлаймиз (Овозини ўчирамиз)
        const ws = WaveSurfer.create({
            container: '#mWave',
            waveColor: '#1f6feb',
            progressColor: '#58a6ff',
            height: 96,
            barWidth: 2,
            interact: false // Фойдаланувчи босиб овозини чиқариб юбормаслиги учун
        });

        document.getElementById('audioInput').onchange = async (e) => {
            const file = e.target.files[0];
            if (file) {
                ws.load(URL.createObjectURL(file));
                // WaveSurfer овозини доимий 0 қилиб қўямиз
                ws.setMuted(true); 
                
                const ab = await file.arrayBuffer();
                if(!audioCtx) audioCtx = new AudioContext();
                musicBuffer = await audioCtx.decodeAudioData(ab);
            }
        };

        document.getElementById('recBtn').onclick = () => {
            if (isRec) stop(); else start();
        };

        async function start() {
            if (!musicBuffer) return alert("Аввал мусиқа юкланг!");
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            chunks = [];
            mixer = audioCtx.createMediaStreamDestination();

            // 1. МУСИҚА: Соф AudioContext орқали (Бу ерда волум ишлайди)
            musicSource = audioCtx.createBufferSource();
            musicSource.buffer = musicBuffer;
            mGain = audioCtx.createGain();
            
            musicSource.connect(mGain);
            mGain.connect(mixer);
            mGain.connect(audioCtx.destination);
            
            // Жорий волум қиймати
            mGain.gain.value = document.getElementById('mVol').value;

            // 2. МИКРОФОН
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const micSrc = audioCtx.createMediaStreamSource(stream);
            micGain = audioCtx.createGain();
            micSrc.connect(micGain);
            micGain.connect(mixer);
            micGain.gain.value = document.getElementById('micVol').value;

            // РЕКОРДЕР
            rec = new MediaRecorder(mixer.stream);
            rec.ondataavailable = e => chunks.push(e.data);
            rec.onstop = save;
            rec.start();

            musicSource.start(0);
            ws.play(); // Тўлқин ҳаракатланади, лекин овоз чиқармайди
            isRec = true;
            updateUI(true);
        }

        // ВОЛУМЛАРНИ БОШҚАРИШ
        document.getElementById('mVol').oninput = function() {
            const v = parseFloat(this.value);
            document.getElementById('mVolText').innerText = Math.round(v * 100) + '%';
            if (mGain) mGain.gain.setTargetAtTime(v, audioCtx.currentTime, 0.02);
        };

        document.getElementById('micVol').oninput = function() {
            const v = parseFloat(this.value);
            document.getElementById('micVolText').innerText = Math.round(v * 100) + '%';
            if (micGain) micGain.gain.setTargetAtTime(v, audioCtx.currentTime, 0.02);
        };

        function stop() {
            rec.stop(); musicSource.stop(); ws.stop();
            isRec = false; updateUI(false);
        }

        function save() {
            const blob = new Blob(chunks, { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            const s = document.getElementById('saveBtn');
            s.disabled = false; s.classList.remove('opacity-20');
            s.onclick = () => {
                const a = document.createElement('a'); a.href = url; a.download = `Universal_Studio_Rec.wav`; a.click();
            };
        }

        function updateUI(on) {
            const b = document.getElementById('recBtn');
            if(on) {
                b.classList.add('recording-on'); b.innerText = 'STOP RECORD';
                startTimer();
            } else {
                b.classList.remove('recording-on'); b.innerText = 'RECORD';
                stopTimer();
            }
        }

        let sT, tI;
        function startTimer() { sT = Date.now(); tI = setInterval(() => {
            const d = Date.now() - sT;
            const m = Math.floor(d/60000).toString().padStart(2,'0');
            const s = Math.floor((d%60000)/1000).toString().padStart(2,'0');
            document.getElementById('timer').innerText = `00:${m}:${s}`;
        }, 1000); }
        function stopTimer() { clearInterval(tI); }
    </script>
</body>
</html>
