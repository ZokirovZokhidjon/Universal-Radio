<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Channel - Control Center v4.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <style>
        body { background: #010409; color: #e6edf3; font-family: 'Segoe UI', sans-serif; height: 100vh; margin: 0; display: flex; flex-direction: column; padding: 15px; overflow: hidden; }
        .glass-panel { background: #0d1117; border: 1px solid #30363d; border-radius: 15px; }
        .hidden { display: none !important; }
        
        /* ЛОГОТИП АНИМАЦИЯСИ */
        @keyframes rainbowGlow {
            0% { box-shadow: 0 0 20px #ff0000; border-color: #ff0000; transform: scale(1); }
            33% { box-shadow: 0 0 30px #00ff00; border-color: #00ff00; transform: scale(1.02); }
            66% { box-shadow: 0 0 30px #0000ff; border-color: #0000ff; transform: scale(1); }
            100% { box-shadow: 0 0 20px #ff0000; border-color: #ff0000; transform: scale(1); }
        }
        .magic-logo { width: 140px; height: 140px; border-radius: 50%; border: 5px solid; animation: rainbowGlow 4s infinite ease-in-out; overflow: hidden; background: #000; }
        .magic-logo img { width: 100%; height: 100%; object-fit: cover; }

        .stat-card { background: linear-gradient(145deg, #161b22, #0d1117); border: 1px solid #30363d; }
        .track-item { background: #161b22; border: 1px solid #30363d; padding: 10px; margin-bottom: 5px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .active-track { border-color: #3b82f6; background: #1c2128; border-left: 4px solid #3b82f6; }
        
        /* EDITOR STYLE */
        #editor-container { height: 150px; background: #fff; color: #000; border-radius: 0 0 10px 10px; }
        .ql-toolbar { background: #f3f4f6; border-radius: 10px 10px 0 0; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="flex justify-between items-center mb-4">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center font-bold">U</div>
            <h1 class="font-bold uppercase tracking-widest text-sm text-blue-500">Universal Channel Production</h1>
        </div>
        <div class="flex gap-3">
            <label class="bg-blue-600 px-4 py-2 rounded-xl cursor-pointer text-[10px] font-bold uppercase hover:bg-blue-500 transition shadow-lg">
                <i class="fas fa-plus-circle mr-2"></i> Папка қўшиш
                <input type="file" id="folderInput" hidden webkitdirectory directory multiple>
            </label>
            <button onclick="clearPlaylist()" class="bg-gray-800 px-4 py-2 rounded-xl text-[10px] font-bold uppercase hover:bg-gray-700 transition">
                <i class="fas fa-trash-alt mr-2"></i> Тозалаш
            </button>
            <button onclick="if(confirm('Дастурдан чиқмоқчимисиз?')) window.close()" class="bg-red-600 px-4 py-2 rounded-xl text-[10px] font-bold uppercase hover:bg-red-700 transition">
                <i class="fas fa-power-off mr-2"></i> Чиқиш
            </button>
        </div>
    </div>

    <div class="grid grid-cols-12 gap-4 flex-grow overflow-hidden">
        
        <div class="col-span-8 flex flex-col gap-4 overflow-hidden">
            <div class="glass-panel flex-grow flex items-center justify-center relative bg-black/40 overflow-hidden min-h-[300px]">
                <div id="noTrack" class="text-gray-600 uppercase tracking-[10px] text-xs font-bold">Offline</div>
                <div id="activeTrack" class="hidden w-full h-full flex flex-col p-6">
                    <div class="flex-grow flex items-center justify-center">
                        <video id="mainVideo" class="hidden w-full h-full object-contain rounded-xl"></video>
                        <div id="audioVisual" class="hidden flex flex-col items-center">
                            <div class="magic-logo">
                                <img src="logo2.jpg" alt="Logo" onerror="this.src='https://via.placeholder.com/220?text=Universal'">
                            </div>
                        </div>
                    </div>
                    <div class="mt-4 glass-panel p-4 bg-gray-900/60">
                        <div id="playingName" class="text-blue-400 text-[10px] font-bold mb-2 truncate uppercase italic">...</div>
                        <div class="flex items-center gap-4">
                            <button onclick="togglePlay()" class="w-10 h-10 bg-blue-600 rounded-full text-white flex items-center justify-center"><i id="playIcon" class="fas fa-play"></i></button>
                            <div class="flex-grow"><div class="bg-gray-800 h-1.5 rounded-full"><div id="pBar" class="bg-blue-500 h-full w-0 shadow-[0_0_10px_#3b82f6]"></div></div></div>
                            <input type="range" id="volSlider" min="0" max="1" step="0.1" value="0.8" class="w-20">
                            <button id="micBtn" onclick="toggleMic()" class="w-10 h-10 bg-gray-800 rounded-full flex items-center justify-center"><i class="fas fa-microphone"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="glass-panel p-3 flex flex-col h-64">
                <div class="flex justify-between items-center mb-2">
                    <h4 class="text-[10px] font-bold uppercase text-blue-400"><i class="fas fa-file-alt mr-2"></i>Янгилик тайёрлаш (Word/Excel ўрнида)</h4>
                    <button onclick="publishToSite()" class="bg-green-600 hover:bg-green-500 text-white px-3 py-1 rounded-lg text-[10px] font-bold uppercase transition animate-pulse">
                        <i class="fas fa-upload mr-1"></i> Сайтга жойлаш
                    </button>
                </div>
                <div id="editor-container"></div>
            </div>
        </div>

        <div class="col-span-4 flex flex-col gap-4 overflow-hidden">
            <div class="glass-panel p-4 flex flex-col flex-grow overflow-hidden">
                <div class="flex justify-between items-center mb-4 border-b border-gray-800 pb-2">
                    <h3 class="text-[10px] font-black uppercase text-blue-500 italic tracking-widest">Навбатдаги файллар</h3>
                    <span id="trackCount" class="text-[9px] text-gray-500">0 файл</span>
                </div>
                <div id="playlist" class="overflow-y-auto flex-grow space-y-2 pr-2"></div>
            </div>

            <div class="glass-panel p-3 flex flex-col">
                <h4 class="text-[10px] font-bold uppercase text-blue-400 mb-2 border-b border-gray-800 pb-1">Эфир статистикаси</h4>
                <div class="flex justify-around gap-2 text-center">
                    <div class="stat-card flex-grow rounded-lg py-2">
                        <i class="fas fa-eye text-blue-500 mb-1 text-xs"></i>
                        <div class="text-md font-black" id="viewCount">0</div>
                        <div class="text-[8px] uppercase text-gray-500">Просмотр</div>
                    </div>
                    <div class="stat-card flex-grow rounded-lg py-2">
                        <i class="fas fa-users text-green-500 mb-1 text-xs"></i>
                        <div class="text-md font-black" id="listenerCount">0</div>
                        <div class="text-[8px] uppercase text-gray-500">Тингловчи</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <audio id="mainAudio"></audio>

    <script>
        // Quill Editor-ни ишга тушириш
        var quill = new Quill('#editor-container', {
            modules: {
                toolbar: [
                    ['bold', 'italic', 'underline'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['image', 'link'],
                    ['clean']
                ]
            },
            placeholder: 'Матнни шу ерга ёзинг ёки расм жойланг...',
            theme: 'snow'
        });

        // publishToSite функциясини қуйидагига алмаштиринг:
function publishToSite() {
    const content = quill.root.innerHTML; // Матн ва расмлар (HTML форматда)
    const textOnly = quill.getText().trim();

    if (textOnly.length < 5) {
        alert("Илтимос, аввал янгилик матнини ёзинг!");
        return;
    }

    // Янгилик объектини яратамиз
    const newsData = {
        id: Date.now(),
        date: new Date().toLocaleString('uz-UZ'),
        body: content
    };

    // Аввалги янгиликларни оламиз ва янгисини қўшамиз
    let allNews = JSON.parse(localStorage.getItem('universal_news')) || [];
    allNews.unshift(newsData); // Янгисини энг тепага қўйиш

    // Маълумотлар омборига (LocalStorage) сақлаймиз
    localStorage.setItem('universal_news', JSON.stringify(allNews));

    alert("Янгилик сайтнинг 'Янгиликлар' саҳифасига юборилди!");
    quill.setContents([]); // Муҳаррирни тозалаш
}

        function updateStats(views, listeners) {
            document.getElementById('viewCount').innerText = views.toLocaleString();
            document.getElementById('listenerCount').innerText = listeners.toLocaleString();
        }
        updateStats(0, 0);

        folderInput.onchange = (e) => {
            const files = Array.from(e.target.files).filter(f => f.type.includes('audio') || f.type.includes('video'));
            const newTracks = files.map((f, i) => ({ 
                 id: Date.now() + Math.random(), 
                 url: URL.createObjectURL(f), 
                 name: f.name, 
                 type: f.type.includes('video') ? 'v' : 'a' 
             }));
            tracks = [...tracks, ...newTracks];
            renderPlaylist();
            if(currentIdx === -1 && tracks.length > 0) play(0);
        };

        function renderPlaylist() {
            playlistDiv.innerHTML = '';
            document.getElementById('trackCount').innerText = `${tracks.length} файл`;
            tracks.forEach((t, i) => {
                const div = document.createElement('div');
                div.className = `track-item ${i === currentIdx ? 'active-track' : ''}`;
                div.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden cursor-pointer flex-grow" onclick="play(${i})">
                        <i class="fas ${t.type === 'v' ? 'fa-video text-blue-500' : 'fa-music text-emerald-500'} text-xs"></i>
                        <span class="truncate text-[10px] font-bold uppercase">${t.name}</span>
                    </div>
                    <i class="fas fa-times-circle text-gray-600 cursor-pointer" onclick="deleteTrack(${i}, event)"></i>
                `;
                playlistDiv.appendChild(div);
            });
        }

        function play(i) {
            if(i < 0 || i >= tracks.length) return;
            currentIdx = i;
            const t = tracks[i];
            document.getElementById('noTrack').classList.add('hidden');
            document.getElementById('activeTrack').classList.remove('hidden');
            document.getElementById('playingName').innerText = t.name;
            video.pause(); audio.pause();
            video.classList.add('hidden');
            document.getElementById('audioVisual').classList.add('hidden');
            if(t.type === 'v') {
                video.src = t.url;
                video.classList.remove('hidden');
                video.play();
                activeMedia = video;
            } else {
                audio.src = t.url;
                document.getElementById('audioVisual').classList.remove('hidden');
                audio.play();
                activeMedia = audio;
            }
            activeMedia.volume = volSlider.value;
            document.getElementById('playIcon').className = "fas fa-pause";
            renderPlaylist();
            activeMedia.onended = () => { if(currentIdx + 1 < tracks.length) play(currentIdx + 1); };
        }

        function deleteTrack(i, event) {
            event.stopPropagation();
            tracks.splice(i, 1);
            renderPlaylist();
        }

        function clearPlaylist() {
            if(confirm("Тозалаш?")) { tracks = []; renderPlaylist(); }
        }

        function togglePlay() {
            if(activeMedia.paused) { activeMedia.play(); document.getElementById('playIcon').className = "fas fa-pause"; }
            else { activeMedia.pause(); document.getElementById('playIcon').className = "fas fa-play"; }
        }

        async function toggleMic() {
            const btn = document.getElementById('micBtn');
            if(!micStream) {
                try {
                    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    btn.classList.add('bg-red-600');
                } catch (err) { alert("Микрофонга рухсат берилмади!"); }
            } else {
                micStream.getTracks().forEach(t => t.stop());
                micStream = null;
                btn.classList.remove('bg-red-600');
            }
        }

        setInterval(() => {
            if(activeMedia && activeMedia.duration) {
                document.getElementById('pBar').style.width = (activeMedia.currentTime / activeMedia.duration * 100) + "%";
            }
        }, 500);
    </script>
</body>
</html>
