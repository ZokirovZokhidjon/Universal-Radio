<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Radio & Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #010409; color: #e6edf3; font-family: 'Segoe UI', sans-serif; min-height: 100vh; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .logo-wrapper { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #30363d; display: flex; align-items: center; justify-content: center; background: #161b22; box-shadow: 0 0 20px rgba(37, 99, 235, 0.4); margin-bottom: 30px; overflow: hidden; }
        .logo-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .main-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; width: 100%; }
        .card { background: #0d1117; border: 1px solid #30363d; border-radius: 24px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Янгиланган меню блоки */
        .custom-news-section { 
            grid-column: 1 / -1; 
            background: #0d1117; 
            border: 1px solid #30363d; 
            border-radius: 24px; 
            padding: 30px; 
            margin-top: 10px;
        }

        .menu-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            list-style: none;
            padding: 0;
        }

        .menu-list li a {
            display: block;
            background: #161b22;
            border: 1px solid #30363d;
            padding: 15px;
            border-radius: 15px;
            color: #2563eb;
            text-align: center;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .menu-list li a:hover {
            background: #2563eb;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3);
        }

        .clock { width: 100px; height: 100px; border: 3px solid #30363d; border-radius: 50%; margin: 0 auto 15px; position: relative; background: #161b22; }
        .dot { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: #2563eb; border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; }
        .hour, .minute, .second { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; border-radius: 10px; transform: translateX(-50%); }
        .hour { width: 4px; height: 25px; background: #e6edf3; }
        .minute { width: 3px; height: 35px; background: #8b949e; }
        .second { width: 2px; height: 40px; background: #ff0000; }
    </style>
</head>
<body>

    <div class="logo-wrapper">
        <img src="logo.jpg" alt="Logo" onerror="this.src='https://via.placeholder.com/120?text=Radio'">
    </div>
    
    <div class="main-container">
        <div class="card text-center">
            <div class="clock"><div class="dot"></div><div class="hour" id="hour"></div><div class="minute" id="minute"></div><div class="second" id="second"></div></div>
            <h2 class="text-sm font-black uppercase mb-2">Админ панел</h2>
            <input type="password" id="passInput" placeholder="ПАРОЛ" class="w-full bg-[#161b22] border border-[#30363d] rounded-xl p-3 mb-4 text-center outline-none text-white focus:border-blue-500 transition">
            <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition text-xs">КИРИШ</button>
        </div>

        <div class="card text-center flex flex-col items-center justify-between">
            <h2 class="text-xl font-black text-blue-400 uppercase tracking-tighter">Universal Radio</h2>
            <div class="relative my-4 w-full">
                <iframe src="https://listen.zeno.fm/player/radio1" frameBorder="0" scrolling="no" height="150" width="100%" style="border-radius: 15px;"></iframe>
            </div>
            <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">Live Broadcast System</p>
        </div>

        <div class="card">
            <h2 class="text-sm font-black text-blue-500 uppercase mb-4 text-center">Мурожаат</h2>
            <form action="https://formspree.io/f/mbdzaopz" method="POST" class="space-y-3">
                <input type="text" name="name" placeholder="Исмингиз" class="w-full bg-[#161b22] border border-[#30363d] rounded-xl p-2 text-sm outline-none text-white focus:border-blue-500" required>
                <textarea name="message" rows="2" placeholder="Хабарингиз..." class="w-full bg-[#161b22] border border-[#30363d] rounded-xl p-2 text-sm outline-none text-white focus:border-blue-500" required></textarea>
                <button type="submit" class="w-full bg-gray-800 hover:bg-gray-700 py-3 rounded-xl text-[10px] font-bold uppercase transition">Юбориш</button>
            </form>
        </div>

        <div class="custom-news-section">
            <h3 class="text-center text-gray-500 uppercase text-xs font-bold mb-6 tracking-widest">Бўлимлар</h3>
            <ul class="menu-list">
                <li><a href="news.html"><i class="fas fa-newspaper mr-2"></i>Янгиликлар</a></li> 
                <li><a href="hikoyalar.html"><i class="fas fa-book-open mr-2"></i>Ҳикоялар</a></li> 
                <li><a href="poetic.html"><i class="fas fa-feather-alt mr-2"></i>Шеърият</a></li> 
                <li><a href="baliq-ovi.html"><i class="fas fa-fish mr-2"></i>Балиқ ови</a></li> 
                <li><a href="med.html"><i class="fas fa-heartbeat mr-2"></i>Табобат</a></li> 
            </ul>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const s = now.getSeconds() * 6, m = now.getMinutes() * 6, h = (now.getHours() % 12) * 30 + now.getMinutes() * 0.5;
            document.getElementById('second').style.transform = `translateX(-50%) rotate(${s}deg)`;
            document.getElementById('minute').style.transform = `translateX(-50%) rotate(${m}deg)`;
            document.getElementById('hour').style.transform = `translateX(-50%) rotate(${h}deg)`;
        }
        setInterval(updateClock, 1000); updateClock();

        function handleLogin() {
            if(document.getElementById('passInput').value === "1975") {
                localStorage.setItem('admin_auth', 'true');
                window.location.href = "admin.html";
            } else { alert("Хато пароль!"); }
        }
    </script>
</body>
</html>
