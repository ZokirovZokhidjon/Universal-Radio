<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Studio - Бошқарув Маркази</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #010409; color: #e6edf3; font-family: 'Segoe UI', system-ui, sans-serif; overflow-x: hidden; }
        .gold-text { color: #ffcc00; }
        .glass-card { 
            background: #0d1117; 
            border: 1px solid #30363d; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            transition: 0.3s;
        }
        .glass-card:hover { border-color: #ffcc00; transform: translateY(-3px); }

        /* Соат стили */
        .clock { width: 80px; height: 80px; border: 2px solid #30363d; border-radius: 50%; margin: 0 auto; position: relative; background: #161b22; }
        .dot { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #ffcc00; border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; }
        .hour, .minute, .second { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; border-radius: 10px; transform: translateX(-50%); }
        .hour { width: 3px; height: 20px; background: #e6edf3; }
        .minute { width: 2px; height: 28px; background: #8b949e; }
        .second { width: 1px; height: 32px; background: #ff4444; }

        input, textarea { background: #010409 !important; border: 1px solid #30363d !important; color: white !important; }
        input:focus, textarea:focus { border-color: #ffcc00 !important; outline: none; }
        
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 border-b border-gray-800 pb-6 gap-6">
            <div class="flex items-center gap-4 w-full md:w-auto">
                <div class="relative w-full md:w-64">
                    <input type="text" id="mainSearch" onkeyup="searchGlobal()" placeholder="Сайтдан қидириш..." 
                           class="bg-[#161b22] border border-[#30363d] rounded-lg px-4 py-2 text-xs text-white w-full outline-none focus:border-yellow-500">
                    <i class="fas fa-search absolute right-3 top-3 text-gray-500 text-[10px]"></i>
                    <div id="searchDropdown" class="absolute top-11 left-0 w-full bg-[#0d1117] border border-[#30363d] rounded-lg shadow-2xl hidden z-50 max-h-60 overflow-y-auto"></div>
                </div>
                <div id="clock-digital" class="text-yellow-500 font-mono text-lg font-bold min-w-[80px]">00:00:00</div>
            </div>

            <div class="text-center">
                <h1 class="text-3xl font-bold uppercase tracking-tighter italic">Universal <span class="gold-text">Studio</span></h1>
                <p class="text-[9px] text-gray-500 uppercase tracking-[5px]">Digital Media System</p>
            </div>

            <div class="text-right hidden md:block">
                <div class="clock"><div class="dot"></div><div class="hour" id="hour"></div><div class="minute" id="minute"></div><div class="second" id="second"></div></div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-12">
            <div class="glass-card p-6 flex flex-col justify-center text-center">
                <i class="fas fa-user-shield text-2xl gold-text mb-3"></i>
                <h2 class="text-[10px] font-bold uppercase mb-4 tracking-widest text-gray-400">Админ Кабинет</h2>
                <input type="password" id="passInput" placeholder="ПАРОЛ" class="w-full rounded-xl p-2.5 mb-3 text-center text-sm">
                <button onclick="handleLogin()" class="w-full bg-white text-black hover:bg-[#ffcc00] py-2.5 rounded-xl font-bold transition text-xs uppercase">Кириш</button>
            </div>

            <div class="glass-card p-6 text-center border-t-4 border-t-yellow-500">
                <h2 class="text-lg font-black gold-text uppercase mb-3">Universal Radio</h2>
                <div class="bg-black/50 rounded-xl overflow-hidden mb-3">
                    <iframe src="https://listen.zeno.fm/player/radio1" frameBorder="0" scrolling="no" height="100" width="100%"></iframe>
                </div>
                <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest italic">Live Broadcast</p>
            </div>

            <div class="glass-card p-6">
                <h2 class="text-[10px] font-bold gold-text uppercase mb-3 text-center tracking-widest">Мурожаат</h2>
                <form action="https://formspree.io/f/mbdzaopz" method="POST" class="space-y-2">
                    <input type="text" name="name" placeholder="Исм" class="w-full rounded-lg p-2 text-xs" required>
                    <textarea name="message" rows="2" placeholder="Хабар..." class="w-full rounded-lg p-2 text-xs" required></textarea>
                    <button type="submit" class="w-full bg-[#161b22] border border-[#30363d] hover:border-yellow-500 py-2 rounded-lg text-[9px] font-bold uppercase transition">Юбориш</button>
                </form>
            </div>
        </div>

        <div class="mt-8">
            <h3 class="text-center text-gray-500 uppercase text-[10px] font-bold mb-8 tracking-[10px]">Бўлимлар</h3>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="glass-card p-5 border-t-2 border-green-500/50 flex flex-col h-full">
                    <div class="flex items-center gap-2 mb-4">
                        <i class="fas fa-heartbeat text-green-500 text-sm"></i>
                        <span class="text-[10px] font-bold uppercase text-gray-400">Табобат</span>
                    </div>
                    <div id="content-tabobat" class="flex-grow italic text-[11px] text-gray-600">Юкланмоқда...</div>
                    <a href="med.html" class="mt-4 text-center bg-green-500/10 hover:bg-green-500 text-green-500 hover:text-black py-2 rounded-lg text-[9px] font-bold uppercase transition">Кириш</a>
                </div>

                <div class="glass-card p-5 border-t-2 border-blue-500/50 flex flex-col h-full">
                    <div class="flex items-center gap-2 mb-4">
                        <i class="fas fa-book-open text-blue-500 text-sm"></i>
                        <span class="text-[10px] font-bold uppercase text-gray-400">Ҳикоялар</span>
                    </div>
                    <div id="content-hikoya" class="flex-grow italic text-[11px] text-gray-600">Юкланмоқда...</div>
                    <a href="hikoyalar.html" class="mt-4 text-center bg-blue-500/10 hover:bg-blue-500 text-blue-500 hover:text-black py-2 rounded-lg text-[9px] font-bold uppercase transition">Кириш</a>
                </div>

                <div class="glass-card p-5 border-t-2 border-purple-500/50 flex flex-col h-full">
                    <div class="flex items-center gap-2 mb-4">
                        <i class="fas fa-feather-alt text-purple-500 text-sm"></i>
                        <span class="text-[10px] font-bold uppercase text-gray-400">Шеърият</span>
                    </div>
                    <div id="content-poetic" class="flex-grow italic text-[11px] text-gray-600">Юкланмоқда...</div>
                    <a href="poetic.html" class="mt-4 text-center bg-purple-500/10 hover:bg-purple-500 text-purple-500 hover:text-black py-2 rounded-lg text-[9px] font-bold uppercase transition">Кириш</a>
                </div>

                <div class="glass-card p-5 border-t-2 border-yellow-500/50 flex flex-col h-full">
                    <div class="flex items-center gap-2 mb-4">
                        <i class="fas fa-fish text-yellow-500 text-sm"></i>
                        <span class="text-[10px] font-bold uppercase text-gray-400">Балиқ ови</span>
                    </div>
                    <div id="content-baliq" class="flex-grow italic text-[11px] text-gray-600">Юкланмоқда...</div>
                    <a href="baliq-ovi.html" class="mt-4 text-center bg-yellow-500/10 hover:bg-yellow-500 text-yellow-500 hover:text-black py-2 rounded-lg text-[9px] font-bold uppercase transition">Кириш</a>
                </div>
            </div>
        </div>

        <footer class="mt-16 text-center text-[9px] text-gray-600 font-mono tracking-widest pb-10">
            &copy; 2026 UNIVERSAL STUDIO PORTAL | DESIGNED BY ZOKIROV
        </footer>
    </div>

    <script>
        // 1. Соат функцияси
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            const digitalClock = document.getElementById('clock-digital');
            if(digitalClock) digitalClock.innerText = `${hours}:${minutes}:${seconds}`;

            const s = now.getSeconds() * 6, 
                  m = now.getMinutes() * 6, 
                  h = (now.getHours() % 12) * 30 + now.getMinutes() * 0.5;
            
            const secHand = document.getElementById('second');
            const minHand = document.getElementById('minute');
            const hourHand = document.getElementById('hour');
            
            if(secHand) secHand.style.transform = `translateX(-50%) rotate(${s}deg)`;
            if(minHand) minHand.style.transform = `translateX(-50%) rotate(${m}deg)`;
            if(hourHand) hourHand.style.transform = `translateX(-50%) rotate(${h}deg)`;
        }
        setInterval(updateClock, 1000);

        // 2. Бўлимлардаги мақолаларни янгилаш
        function updateCategoryCards() {
            const posts = JSON.parse(localStorage.getItem('my_site_posts') || '[]');
            const categories = [
                { name: 'Табобат', id: 'content-tabobat' },
                { name: 'Ҳикоялар', id: 'content-hikoya' },
                { name: 'Шеърият', id: 'content-poetic' },
                { name: 'Балиқ ови', id: 'content-baliq' }
            ];

            categories.forEach(cat => {
                const container = document.getElementById(cat.id);
                if (!container) return;

                // Охирги қўшилган мақолани топиш
                const lastPost = [...posts].reverse().find(p => p.category === cat.name);
                
                if (lastPost) {
                    container.innerHTML = `
                        <h4 class="text-[12px] font-bold text-white mb-2 line-clamp-2">${lastPost.title}</h4>
                        <p class="text-[10px] text-gray-500 line-clamp-3">${lastPost.content.replace(/<[^>]*>/g, '')}</p>
                    `;
                    container.classList.remove('italic', 'text-gray-600');
                } else {
                    container.innerHTML = "Янги мақола мавжуд эмас.";
                }
            });
        }

        // 3. Қидирув
        function searchGlobal() {
            const query = document.getElementById('mainSearch').value.toLowerCase();
            const dropdown = document.getElementById('searchDropdown');
            const posts = JSON.parse(localStorage.getItem('my_site_posts') || '[]');

            if (query.length < 2) {
                dropdown.classList.add('hidden');
                return;
            }

            const results = posts.filter(p => p.title.toLowerCase().includes(query));

            if (results.length > 0) {
                dropdown.classList.remove('hidden');
                dropdown.innerHTML = results.map(p => `
                    <div class="p-3 border-b border-gray-800 hover:bg-yellow-500/10 cursor-pointer" 
                         onclick="localStorage.setItem('selectedPostIndex', ${posts.indexOf(p)}); location.href='news.html'">
                        <h4 class="text-[11px] font-bold text-white">${p.title}</h4>
                        <p class="text-[9px] text-gray-500">${p.category}</p>
                    </div>
                `).join('');
            } else {
                dropdown.innerHTML = "<p class='p-3 text-[10px] text-gray-500'>Топилмади</p>";
                dropdown.classList.remove('hidden');
            }
        }

        // 4. Логин
        function handleLogin() {
            const passVal = document.getElementById('passInput').value;
            if(passVal === "1975") {
                localStorage.setItem('admin_auth', 'true');
                window.location.href = "admin.html";
            } else { 
                alert("Пароль хато!"); 
            }
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('#mainSearch')) {
                document.getElementById('searchDropdown')?.classList.add('hidden');
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            updateClock();
            updateCategoryCards();
        });
    </script>
</body>
</html>
