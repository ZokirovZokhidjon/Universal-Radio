<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Studio - Бошқарув Маркази</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #010409; color: #e6edf3; font-family: 'Segoe UI', system-ui, sans-serif; overflow-x: hidden; }
        .gold-text { color: #ffcc00; }
        .glass-card { 
            background: #0d1117; 
            border: 1px solid #30363d; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            transition: 0.3s;
        }
        .glass-card:hover { border-color: #ffcc00; transform: translateY(-3px); }

        /* Соат стили */
        .clock { width: 80px; height: 80px; border: 2px solid #30363d; border-radius: 50%; margin: 0 auto; position: relative; background: #161b22; }
        .dot { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #ffcc00; border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; }
        .hour, .minute, .second { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; border-radius: 10px; transform: translateX(-50%); }
        .hour { width: 3px; height: 20px; background: #e6edf3; }
        .minute { width: 2px; height: 28px; background: #8b949e; }
        .second { width: 1px; height: 32px; background: #ff4444; }

        input, textarea { background: #010409 !important; border: 1px solid #30363d !important; color: white !important; }
        input:focus, textarea:focus { border-color: #ffcc00 !important; outline: none; }
        
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto px-4 py-12">
    <h2 class="text-center text-gray-500 text-[10px] tracking-[5px] uppercase mb-12 italic font-bold">Б ў л и м л а р</h2>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4">
        
        <div class="border border-blue-500/20 bg-[#0d1117] rounded-2xl p-6 flex flex-col justify-between transition hover:border-blue-500 group">
            <div>
                <div class="flex items-center gap-2 mb-4 text-blue-500">
                    <i class="fas fa-newspaper"></i>
                    <span class="text-[10px] font-bold uppercase tracking-widest">Янгиликлар</span>
                </div>
                <div id="preview-news">
                    <p class="text-gray-600 italic text-[11px]">Янги мақола мавжуд эмас.</p>
                </div>
            </div>
            <a href="news.html" class="mt-6 block text-center bg-blue-500/5 group-hover:bg-blue-500 text-blue-500 group-hover:text-white py-2 rounded-xl text-[10px] font-bold uppercase transition">Кириш</a>
        </div>

        <div class="border border-green-500/20 bg-[#0d1117] rounded-2xl p-6 flex flex-col justify-between transition hover:border-green-500 group">
            <div>
                <div class="flex items-center gap-2 mb-4 text-green-500">
                    <i class="fas fa-heartbeat"></i>
                    <span class="text-[10px] font-bold uppercase tracking-widest">Табобат</span>
                </div>
                <div id="preview-med">
                    <p class="text-gray-600 italic text-[11px]">Янги мақола мавжуд эмас.</p>
                </div>
            </div>
            <a href="med.html" class="mt-6 block text-center bg-green-500/5 group-hover:bg-green-500 text-green-500 group-hover:text-white py-2 rounded-xl text-[10px] font-bold uppercase transition">Кириш</a>
        </div>

        <div class="border border-indigo-500/20 bg-[#0d1117] rounded-2xl p-6 flex flex-col justify-between transition hover:border-indigo-500 group">
            <div>
                <div class="flex items-center gap-2 mb-4 text-indigo-500">
                    <i class="fas fa-book"></i>
                    <span class="text-[10px] font-bold uppercase tracking-widest">Ҳикоялар</span>
                </div>
                <div id="preview-story">
                    <p class="text-gray-600 italic text-[11px]">Янги мақола мавжуд эмас.</p>
                </div>
            </div>
            <a href="hikoya.html" class="mt-6 block text-center bg-indigo-500/5 group-hover:bg-indigo-500 text-indigo-500 group-hover:text-white py-2 rounded-xl text-[10px] font-bold uppercase transition">Кириш</a>
        </div>

        <div class="border border-purple-500/20 bg-[#0d1117] rounded-2xl p-6 flex flex-col justify-between transition hover:border-purple-500 group">
            <div>
                <div class="flex items-center gap-2 mb-4 text-purple-500">
                    <i class="fas fa-feather-alt"></i>
                    <span class="text-[10px] font-bold uppercase tracking-widest">Шеърият</span>
                </div>
                <div id="preview-poem">
                    <p class="text-gray-600 italic text-[11px]">Янги мақола мавжуд эмас.</p>
                </div>
            </div>
            <a href="poem.html" class="mt-6 block text-center bg-purple-500/5 group-hover:bg-purple-500 text-purple-500 group-hover:text-white py-2 rounded-xl text-[10px] font-bold uppercase transition">Кириш</a>
        </div>

        <div class="border border-yellow-500/20 bg-[#0d1117] rounded-2xl p-6 flex flex-col justify-between transition hover:border-yellow-500 group">
            <div>
                <div class="flex items-center gap-2 mb-4 text-yellow-500">
                    <i class="fas fa-fish"></i>
                    <span class="text-[10px] font-bold uppercase tracking-widest">Балиқ ови</span>
                </div>
                <div id="preview-fish">
                    <p class="text-gray-600 italic text-[11px]">Янги мақола мавжуд эмас.</p>
                </div>
            </div>
            <a href="fish.html" class="mt-6 block text-center bg-yellow-500/5 group-hover:bg-yellow-500 text-yellow-500 group-hover:text-white py-2 rounded-xl text-[10px] font-bold uppercase transition">Кириш</a>
        </div>

    </div>
</div>

<script>
    function updateSectionPreviews() {
        const posts = JSON.parse(localStorage.getItem('my_site_posts') || '[]');
        
        const categories = [
            { id: 'preview-news', name: 'Янгиликлар' },
            { id: 'preview-med', name: 'Табобат' },
            { id: 'preview-story', name: 'Ҳикоялар' },
            { id: 'preview-poem', name: 'Шеърият' },
            { id: 'preview-fish', name: 'Балиқ ови' }
        ];

        categories.forEach(cat => {
            const container = document.getElementById(cat.id);
            // Шу категориядаги энг охирги мақолани олиш
            const lastPost = posts.filter(p => p.category === cat.name).reverse()[0];
            
            if (lastPost) {
                // HTML тегларини тозалаб, фақат матнни олиш
                const cleanText = lastPost.content.replace(/<[^>]*>/g, '').substring(0, 80);
                container.innerHTML = `
                    <h3 class="text-white font-bold text-[13px] mb-2 line-clamp-2">${lastPost.title}</h3>
                    <p class="text-gray-500 text-[11px] leading-relaxed line-clamp-3">${cleanText}...</p>
                `;
            }
        });
    }

    // Саҳифа юкланганда ишга тушириш
    window.addEventListener('DOMContentLoaded', updateSectionPreviews);
</script>
</body>
</html>
