<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Studio - Бошқарув Маркази</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #010409; color: #e6edf3; font-family: 'Segoe UI', system-ui, sans-serif; }
        .gold-text { color: #ffcc00; }
        .glass-card { 
            background: #0d1117; 
            border: 1px solid #30363d; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            transition: 0.3s;
        }
        .glass-card:hover { border-color: #ffcc00; }

        /* Соат стили */
        .clock { width: 80px; height: 80px; border: 2px solid #30363d; border-radius: 50%; margin: 0 auto; position: relative; background: #161b22; }
        .dot { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #ffcc00; border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; }
        .hour, .minute, .second { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; border-radius: 10px; transform: translateX(-50%); }
        .hour { width: 3px; height: 20px; background: #e6edf3; }
        .minute { width: 2px; height: 28px; background: #8b949e; }
        .second { width: 1px; height: 32px; background: #ff4444; }

        .menu-btn {
            background: #161b22; border: 1px solid #30363d; border-radius: 15px;
            padding: 20px; text-align: center; transition: all 0.3s;
        }
        .menu-btn:hover { background: #ffcc00; color: #000 !important; transform: translateY(-5px); }
        .menu-btn:hover i { color: #000 !important; }

        input, textarea { background: #010409 !important; border: 1px solid #30363d !important; color: white !important; }
        input:focus, textarea:focus { border-color: #ffcc00 !important; outline: none; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 border-b border-gray-800 pb-6 gap-6">
            <div class="flex items-center gap-6 w-full md:w-auto">
                <div class="relative w-full md:w-64">
                    <input type="text" id="mainSearch" onkeyup="searchGlobal()" placeholder="Қидириш..." 
                           class="bg-[#161b22] border border-[#30363d] rounded-lg px-4 py-1.5 text-xs text-white w-full outline-none focus:border-yellow-500">
                    <i class="fas fa-search absolute right-3 top-2.5 text-gray-500 text-[10px]"></i>
                    <div id="searchDropdown" class="absolute top-10 left-0 w-full bg-[#0d1117] border border-[#30363d] rounded-lg shadow-2xl hidden z-50 max-h-60 overflow-y-auto"></div>
                </div>
                <div id="clock-digital" class="text-yellow-500 font-mono text-lg font-bold">00:00:00</div>
            </div>

            <div class="text-center">
                <h1 class="text-3xl font-bold uppercase tracking-tighter italic">Universal <span class="gold-text">Studio</span></h1>
                <p class="text-[9px] text-gray-500 uppercase tracking-[5px]">Digital Media System</p>
            </div>

            <div class="text-right hidden md:block">
                <div class="clock"><div class="dot"></div><div class="hour" id="hour"></div><div class="minute" id="minute"></div><div class="second" id="second"></div></div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="glass-card p-8 flex flex-col justify-center text-center">
                <i class="fas fa-user-shield text-3xl gold-text mb-4"></i>
                <h2 class="text-xs font-bold uppercase mb-4 tracking-widest">Админ Кабинет</h2>
                <input type="password" id="passInput" placeholder="ПАРОЛ" class="w-full rounded-xl p-3 mb-3 text-center text-sm">
                <button onclick="handleLogin()" class="w-full bg-white text-black hover:bg-[#ffcc00] py-3 rounded-xl font-bold transition text-xs uppercase">Кириш</button>
            </div>

            <div class="glass-card p-8 text-center border-t-4 border-t-yellow-500">
                <h2 class="text-xl font-black gold-text uppercase mb-4">Universal Radio</h2>
                <div class="bg-black/50 rounded-2xl overflow-hidden mb-4">
                    <iframe src="https://listen.zeno.fm/player/radio1" frameBorder="0" scrolling="no" height="100" width="100%"></iframe>
                </div>
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest italic">Live Broadcast System</p>
            </div>

            <div class="glass-card p-8">
                <h2 class="text-xs font-bold gold-text uppercase mb-4 text-center tracking-widest">Мурожаат йўллаш</h2>
                <form action="https://formspree.io/f/mbdzaopz" method="POST" class="space-y-3">
                    <input type="text" name="name" placeholder="Исмингиз" class="w-full rounded-lg p-2 text-sm" required>
                    <textarea name="message" rows="2" placeholder="Хабарингиз..." class="w-full rounded-lg p-2 text-sm" required></textarea>
                    <button type="submit" class="w-full bg-[#161b22] border border-[#30363d] hover:border-yellow-500 py-2 rounded-lg text-[10px] font-bold uppercase transition">Юбориш</button>
                </form>
            </div>
        </div>

        <div class="mt-12">
            <h3 class="text-center text-gray-500 uppercase text-[10px] font-bold mb-8 tracking-[10px]">Бўлимлар</h3>
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
                <a href="news.html" class="menu-btn">
                    <i class="fas fa-newspaper text-2xl gold-text mb-3"></i>
                    <span class="block text-xs font-bold uppercase">Янгиликлар</span>
                </a>
                <a href="hikoyalar.html" class="menu-btn">
                    <i class="fas fa-book-open text-2xl gold-text mb-3"></i>
                    <span class="block text-xs font-bold uppercase">Ҳикоялар</span>
                </a>
                <a href="poetic.html" class="menu-btn">
                    <i class="fas fa-feather-alt text-2xl gold-text mb-3"></i>
                    <span class="block text-xs font-bold uppercase">Шеърият</span>
                </a>
                <a href="baliq-ovi.html" class="menu-btn">
                    <i class="fas fa-fish text-2xl gold-text mb-3"></i>
                    <span class="block text-xs font-bold uppercase">Балиқ ови</span>
                </a>
                <a href="med.html" class="menu-btn">
                    <i class="fas fa-heartbeat text-2xl gold-text mb-3"></i>
                    <span class="block text-xs font-bold uppercase">Табобат</span>
                </a>
            </div>
        </div>

        <footer class="mt-16 text-center text-[10px] text-gray-600 font-mono tracking-widest pb-10">
            &copy; 2026 UNIVERSAL STUDIO PORTAL | DESIGNED FOR ZOKIROV
        </footer>
    </div>

    <script>
        // 1. Соат функцияси
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            // Рақамли соат
            const digitalClock = document.getElementById('clock-digital');
            if(digitalClock) digitalClock.innerText = `${hours}:${minutes}:${seconds}`;

            // Аналог соат (стрелкалар)
            const s = now.getSeconds() * 6, 
                  m = now.getMinutes() * 6, 
                  h = (now.getHours() % 12) * 30 + now.getMinutes() * 0.5;
            
            const secHand = document.getElementById('second');
            const minHand = document.getElementById('minute');
            const hourHand = document.getElementById('hour');
            
            if(secHand) secHand.style.transform = `translateX(-50%) rotate(${s}deg)`;
            if(minHand) minHand.style.transform = `translateX(-50%) rotate(${m}deg)`;
            if(hourHand) hourHand.style.transform = `translateX(-50%) rotate(${h}deg)`;
        }
        setInterval(updateClock, 1000);

        // 2. Қидирув функцияси
        function searchGlobal() {
            const query = document.getElementById('mainSearch').value.toLowerCase();
            const dropdown = document.getElementById('searchDropdown');
            const posts = JSON.parse(localStorage.getItem('my_site_posts') || '[]');

            if (query.length < 2) {
                dropdown.classList.add('hidden');
                return;
            }

            const results = posts.filter(p => p.title.toLowerCase().includes(query));

            if (results.length > 0) {
                dropdown.classList.remove('hidden');
                dropdown.innerHTML = results.map(p => `
                    <div class="p-3 border-b border-gray-800 hover:bg-yellow-500/10 cursor-pointer" 
                         onclick="localStorage.setItem('selectedPostIndex', ${posts.indexOf(p)}); location.href='news.html'">
                        <h4 class="text-[11px] font-bold text-white">${p.title}</h4>
                        <p class="text-[9px] text-gray-500">${p.category || 'Янгилик'}</p>
                    </div>
                `).join('');
            } else {
                dropdown.innerHTML = "<p class='p-3 text-[10px] text-gray-500'>Ҳеч нарса топилмади</p>";
                dropdown.classList.remove('hidden');
            }
        }

        // 3. Логин
        function handleLogin() {
            const passVal = document.getElementById('passInput').value;
            if(passVal === "1975") {
                localStorage.setItem('admin_auth', 'true');
                window.location.href = "admin.html";
            } else { 
                alert("Хато пароль!"); 
            }
        }

        // Саҳифа ташқарисини босганда қидирувни ёпиш
        document.addEventListener('click', (e) => {
            if (!e.target.closest('#mainSearch')) {
                document.getElementById('searchDropdown')?.classList.add('hidden');
            }
        });

        document.addEventListener('DOMContentLoaded', updateClock);
    </script>
</body>
</html>
